name: Renovate automerge for whitelisted apps

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - localApps

concurrency:
  group: renovate-automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge:
    if: >
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.user.login == 'app/renovate' &&
      contains(github.event.pull_request.labels.*.name, 'renovate-auto')
    runs-on: ubuntu-latest

    steps:
      - name: Verify changed files stay within whitelist
        id: whitelist
        env:
          GH_TOKEN: ${{ secrets.GITHUBTOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          mapfile -t files < <(gh api "repos/$REPO/pulls/$PR_NUMBER/files" --paginate --jq '.[].filename')

          if [ ${#files[@]} -eq 0 ]; then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          allowed_regex='^(apps/(upsnap|pwpush|code-server|zeroclaw|next-terminal|dpanel|wallos|chatgpt-on-wechat|music_tag_web|audiobookshelf|clouddrive2|cloudbeaver|dbgate|frigate|openclaw|moviepilot|sonarr|gopeed)/|renovate\.json$)'
          allowed=true

          printf 'Changed files:\n'
          for file in "${files[@]}"; do
            echo "- $file"
            if [[ ! "$file" =~ $allowed_regex ]]; then
              allowed=false
            fi
          done

          echo "allowed=$allowed" >> "$GITHUB_OUTPUT"

      - name: Check commits for app-version update marker
        id: marker
        if: steps.whitelist.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUBTOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          COMMITS=$(gh api repos/$REPO/pulls/$PR_NUMBER/commits --paginate --jq '.[].commit.message')

          echo "$COMMITS"

          if echo "$COMMITS" | grep -Fq "Update app version [skip ci]"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge PR
        if: steps.whitelist.outputs.allowed == 'true' && steps.marker.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUBTOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --merge \
            --delete-branch=false
