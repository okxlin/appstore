networks:
  1panel-network:
    external: true
services:
  jackett:
    image: "linuxserver/jackett:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:9117"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${DOWNLOAD_PATH}:/downloads"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - AUTO_UPDATE=${AUTO_UPDATE}
      - RUN_OPTS=${RUN_OPTS:-}
    labels:
      createdBy: "Apps"
