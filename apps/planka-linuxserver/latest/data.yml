      zh-Hant: 資料庫密碼
      ja: データベースパスワード
      ko: 데이터베이스 비밀번호
      ru: Пароль базы данных
      ms: Kata laluan pangkalan data
      pt-br: Senha do banco de dados
    required: true
    type: password
    rule: paramComplexity
  - default: admin@example.com
    edit: true
    envKey: DEFAULT_ADMIN_EMAIL
    labelEn: Admin email
    labelZh: 管理员邮箱
    label:
      en: Admin email
      zh: 管理员邮箱
      zh-Hant: 管理員信箱
      ja: 管理者メール
      ko: 관리자 이메일
      ru: Email администратора
      ms: E-mel pentadbir
