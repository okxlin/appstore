    labelZh: 管理员密码
    label:
      en: Admin password
      zh: 管理员密码
      zh-Hant: 管理員密碼
      ja: 管理者パスワード
      ko: 관리자 비밀번호
      ru: Пароль администратора
      ms: Kata laluan pentadbir
      pt-br: Senha do administrador
