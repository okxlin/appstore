services:
  collabora:
    image: "collabora/code:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:9980"
    environment:
      - username=${ADMIN_USERNAME}
      - password=${ADMIN_PASSWORD}
      - aliasgroup1=${WOPI_ALIAS_GROUP}
      - server_name=${SERVER_NAME}
      - dictionaries=${DICTIONARIES}
      - extra_params=${EXTRA_PARAMS}
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
