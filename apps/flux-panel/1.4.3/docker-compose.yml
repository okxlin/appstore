services:
  mysql:
    image: "mysql:5.7"
    container_name: ${CONTAINER_NAME}-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
      INIT_SQL_GZIP_BASE64: 
    entrypoint:
      - /bin/bash
      - -c
      - |
        printf '%s' "$$INIT_SQL_GZIP_BASE64" | base64 -d | gzip -d > /docker-entrypoint-initdb.d/gost.sql
        exec /usr/local/bin/docker-entrypoint.sh mysqld "$$@"
      - --
    volumes:
      - "${APP_DATA_DIR}/mysql:/var/lib/mysql"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
      - --innodb_buffer_pool_size=256M
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    labels:
      createdBy: "Apps"
    networks:
      - 1panel-network

  backend:
    image: "bqlpfy/springboot-backend:v3.1.2"
    container_name: ${CONTAINER_NAME}-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      LOG_DIR: /app/logs
      JAVA_OPTS: -Xms256m -Xmx512m -Dfile.encoding=UTF-8 -Duser.timezone=${TZ}
    volumes:
      - "${APP_DATA_DIR}/logs:/app/logs"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:6365/flow/test || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    labels:
      createdBy: "Apps"
    networks:
      - 1panel-network

  frontend:
    image: "bqlpfy/vite-frontend:1.4.3"
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${PANEL_APP_PORT_HTTP}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    labels:
      createdBy: "Apps"
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true
