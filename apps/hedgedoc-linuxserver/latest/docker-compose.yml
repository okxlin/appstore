networks:
  1panel-network:
    external: true
services:
  hedgedoc:
    image: "linuxserver/hedgedoc:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:3000"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - DB_HOST=hedgedoc-db
      - DB_PORT=3306
      - DB_USER=hedgedoc
      - DB_PASS=${DB_PASSWORD}
      - DB_NAME=hedgedoc
      - CMD_DOMAIN=${CMD_DOMAIN}
      - CMD_URL_ADDPORT=true
      - CMD_PROTOCOL_USESSL=false
      - CMD_PORT=3000
      - CMD_ALLOW_ORIGIN=['localhost']
      - CMD_DB_DIALECT=mariadb
    depends_on:
      - hedgedoc-db
    labels:
      createdBy: "Apps"
  hedgedoc-db:
    image: "mariadb:11.4"
    restart: always
    networks:
      - 1panel-network
    volumes:
      - "${DB_DATA_PATH}:/var/lib/mysql"
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_PASSWORD}
      - MARIADB_DATABASE=hedgedoc
      - MARIADB_USER=hedgedoc
      - MARIADB_PASSWORD=${DB_PASSWORD}
    labels:
      createdBy: "Apps"
