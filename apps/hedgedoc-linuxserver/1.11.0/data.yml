additionalProperties:
  formFields:
  - default: 3000
    edit: true
    envKey: PANEL_APP_PORT_HTTP
    labelEn: HTTP Port
    labelZh: HTTP 端口
    label:
      en: HTTP Port
      zh: HTTP 端口
      zh-Hant: HTTP 連接埠
      ja: HTTP ポート
      ko: HTTP 포트
      ru: HTTP-порт
      ms: Port HTTP
      pt-br: Porta HTTP
    required: true
    type: number
    rule: paramPort
  - default: ./data/config
    edit: true
    envKey: CONFIG_PATH
    labelEn: Config folder path
    labelZh: 配置文件路径
    label:
      en: Config folder path
      zh: 配置文件路径
      zh-Hant: 設定檔資料夾路徑
      ja: 設定フォルダーのパス
      ko: 설정 폴더 경로
      ru: Путь к папке конфигурации
      ms: Laluan folder konfigurasi
      pt-br: Caminho da pasta de configuração
    required: true
    type: text
  - default: hedgedoc-change-me
    edit: true
    envKey: DB_PASSWORD
    labelEn: Database password
    labelZh: 数据库密码
    label:
      en: Database password
      zh: 数据库密码
      zh-Hant: 資料庫密碼
      ja: データベースパスワード
      ko: 데이터베이스 비밀번호
      ru: Пароль базы данных
      ms: Kata laluan pangkalan data
      pt-br: Senha do banco de dados
    required: true
    type: password
    rule: paramComplexity
  - default: localhost
    edit: true
    envKey: CMD_DOMAIN
    labelEn: Access domain
    labelZh: 访问域名
    label:
      en: Access domain
      zh: 访问域名
      zh-Hant: 存取網域
      ja: アクセスドメイン
      ko: 접속 도메인
      ru: Домен доступа
      ms: Domain akses
      pt-br: Dominio de acesso
    required: true
    type: text
  - default: "true"
    edit: true
    envKey: CMD_URL_ADDPORT
    labelEn: Add port to URL
    labelZh: URL 添加端口
    label:
      en: Add port to URL
      zh: URL 添加端口
      zh-Hant: URL 加入連接埠
      ja: URL にポートを追加
      ko: URL에 포트 추가
      ru: Добавлять порт в URL
      ms: Tambah port pada URL
      pt-br: Adicionar porta a URL
    required: false
    type: select
    values:
      - label: "true"
        value: "true"
      - label: "false"
        value: "false"
  - default: "false"
    edit: true
    envKey: CMD_PROTOCOL_USESSL
    labelEn: Use HTTPS protocol
    labelZh: 使用 HTTPS 协议
    label:
      en: Use HTTPS protocol
      zh: 使用 HTTPS 协议
      zh-Hant: 使用 HTTPS 通訊協定
      ja: HTTPS プロトコルを使用
      ko: HTTPS 프로토콜 사용
      ru: Использовать протокол HTTPS
      ms: Gunakan protokol HTTPS
      pt-br: Usar protocolo HTTPS
    required: false
    type: select
    values:
      - label: "true"
        value: "true"
      - label: "false"
        value: "false"
  - default: "['localhost']"
    edit: true
    envKey: CMD_ALLOW_ORIGIN
    labelEn: Allowed origins
    labelZh: 允许的来源
    label:
      en: Allowed origins
      zh: 允许的来源
      zh-Hant: 允許的來源
      ja: 許可されたオリジン
      ko: 허용된 출처
      ru: Разрешенные источники
      ms: Asal dibenarkan
      pt-br: Origens permitidas
    required: false
    type: text
  - default: ./data/db
    edit: true
    envKey: DB_DATA_PATH
    labelEn: Database data path
    labelZh: 数据库数据目录
    label:
      en: Database data path
      zh: 数据库数据目录
      zh-Hant: 資料庫資料目錄
      ja: データベースデータディレクトリ
      ko: 데이터베이스 데이터 디렉터리
      ru: Каталог данных базы
      ms: Laluan data pangkalan data
      pt-br: Caminho de dados do banco
    required: true
    type: text
  - default: Asia/Shanghai
    edit: true
    envKey: TIME_ZONE
    labelEn: Time zone
    labelZh: 时区
    label:
      en: Time zone
      zh: 时区
      zh-Hant: 時區
      ja: タイムゾーン
      ko: 시간대
      ru: Часовой пояс
      ms: Zon waktu
      pt-br: Fuso horário
    required: true
    type: text
