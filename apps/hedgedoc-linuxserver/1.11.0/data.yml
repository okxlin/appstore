    type: select
    values:
      - label: "true"
        value: "true"
      - label: "false"
        value: "false"
  - default: 3000
    edit: true
    envKey: CMD_PORT
    labelEn: Internal application port
    labelZh: 应用内部端口
    label:
      en: Internal application port
      zh: 应用内部端口
      zh-Hant: 應用程式內部連接埠
