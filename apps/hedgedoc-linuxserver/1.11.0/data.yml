      ru: Разрешенные источники
      ms: Asal dibenarkan
      pt-br: Origens permitidas
    required: false
    type: text
  - default: mariadb
    edit: true
    envKey: CMD_DB_DIALECT
    labelEn: Database dialect
    labelZh: 数据库类型
    label:
      en: Database dialect
      zh: 数据库类型
      zh-Hant: 資料庫類型
      ja: データベース種別
      ko: 데이터베이스 유형
