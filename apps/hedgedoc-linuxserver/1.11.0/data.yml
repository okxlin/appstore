      ms: Port dalaman aplikasi
      pt-br: Porta interna do aplicativo
    required: true
    type: number
  - default: "['localhost']"
    edit: true
    envKey: CMD_ALLOW_ORIGIN
    labelEn: Allowed origins
    labelZh: 允许的来源
    label:
      en: Allowed origins
      zh: 允许的来源
      zh-Hant: 允許的來源
