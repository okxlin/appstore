additionalProperties:
  formFields:
    - default: mysql
      envKey: PANEL_DB_TYPE
      labelEn: Database Service
      labelZh: 数据库服务
      label:
        en: 'Database Service'
        zh: '数据库服务'
        zh-Hant: '數據庫服務'
        ja: 'データベースサービス'
        ko: '데이터베이스 서비스'
        ru: 'Сервис базы данных'
        ms: 'Perkhidmatan Pangkalan Data'
        pt-br: 'Serviço de Banco de Dados'
      required: true
      type: apps
      values:
        - label: "MySQL"
          value: mysql
        - label: "LocalMySQL"
          value: localmysql
      child:
        default: ""
        envKey: PANEL_DB_HOST
        labelEn: Database Service
        labelZh: 数据库服务
        label:
          en: 'Database Service'
          zh: '数据库服务'
          zh-Hant: '數據庫服務'
          ja: 'データベースサービス'
          ko: '데이터베이스 서비스'
          ru: 'Сервис базы данных'
          ms: 'Perkhidmatan Pangkalan Data'
          pt-br: 'Serviço de Banco de Dados'
        required: true
        type: service
    - default: "3306"
      edit: true
      envKey: PANEL_DB_PORT
      labelEn: Database Port
      labelZh: 数据库端口
      label:
        en: 'Database Port'
        zh: '数据库端口'
        zh-Hant: '資料庫埠'
        ja: 'データベースポート'
        ko: '데이터베이스 포트'
        ru: 'Порт базы данных'
        ms: 'Port Pangkalan Data'
        pt-br: 'Porta do Banco de Dados'
      required: true
      rule: paramPort
      type: number
