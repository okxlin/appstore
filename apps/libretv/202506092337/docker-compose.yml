services:
  libretv:
    container_name: ${CONTAINER_NAME}
    image: bestzwei/libretv:latest
    ports:
      - ${PANEL_APP_PORT_HTTP}:8080
    environment:
      - PASSWORD=${PANEL_APP_PASSWORD}
    restart: unless-stopped
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true

