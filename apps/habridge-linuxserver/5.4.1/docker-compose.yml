networks:
  1panel-network:
    external: true
services:
  habridge:
    image: "linuxserver/habridge:5.4.1"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8080"
      - "${PANEL_APP_PORT_COMM}:50000"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - SEC_KEY=${SEC_KEY}
    labels:
      createdBy: "Apps"
