additionalProperties:
  formFields:
    - default: 40194
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Port
      labelZh: 端口
      label:
        en: 'Port'
        zh: '端口'
        zh-Hant: '埠'
        ja: 'ポート'
        ko: '포트'
        ru: 'Порт'
        ms: 'Port'
        pt-br: 'Porta'
      required: true
      rule: paramPort
      type: number
    - default: ./data/upload
      edit: true
      envKey: UPLOAD_LOCATION
      labelEn: Path to folder for uploading
      labelZh: 上传用文件夹路径
      label:
        en: 'Path to folder for uploading'
        zh: '上传用文件夹路径'
        zh-Hant: '上傳用資料夾路徑'
        ja: 'アップロード用フォルダーパス'
        ko: '업로드 폴더 경로'
        ru: 'Путь к папке для загрузки'
        ms: 'Laluan folder untuk muat naik'
        pt-br: 'Caminho da pasta para upload'
      required: true
      type: text
    - default: ./data/cache
      edit: true
      envKey: CACHE_PATH
      labelEn: Cache folder path
      labelZh: 缓存文件夹路径
      label:
        en: 'Cache folder path'
        zh: '缓存文件夹路径'
        zh-Hant: '快取資料夾路徑'
        ja: 'キャッシュフォルダーパス'
        ko: '캐시 폴더 경로'
        ru: 'Путь к папке кэша'
        ms: 'Laluan folder cache'
        pt-br: 'Caminho da pasta de cache'
      required: true
      type: text
    - default: ./data/data
      edit: true
      envKey: DB_PATH
      labelEn: Database folder path
      labelZh: 数据库文件夹路径
      label:
        en: 'Database folder path'
        zh: '数据库文件夹路径'
        zh-Hant: '資料庫資料夾路徑'
        ja: 'データベースフォルダーパス'
        ko: '데이터베이스 폴더 경로'
        ru: 'Путь к папке базы данных'
        ms: 'Laluan folder pangkalan data'
        pt-br: 'Caminho da pasta do banco de dados'
      required: true
      type: text
    - default: SSD
      edit: true
      envKey: DB_STORAGE_TYPE
      labelEn: Database storage type
      labelZh: 数据库存储类型
      label:
        en: Database storage type
        zh: 数据库存储类型
        zh-Hant: 資料庫儲存類型
        ja: データベースストレージ種別
        ko: 데이터베이스 저장소 유형
        ru: Тип хранилища базы данных
        ms: Jenis storan pangkalan data
        pt-br: Tipo de armazenamento do banco
      required: true
      type: select
      values:
        - label: SSD
          value: SSD
        - label: HDD
          value: HDD
    - default: immich
      edit: true
      envKey: PANEL_DB_NAME
      labelEn: Database
      labelZh: 数据库名
      label:
        en: 'Database'
        zh: '数据库名'
        zh-Hant: '數據庫名'
        ja: 'データベース'
        ko: '데이터베이스'
        ru: 'База данных'
        ms: 'Pangkalan Data'
        pt-br: 'Banco de Dados'
      required: true
      rule: paramCommon
      type: text
    - default: postgres
      edit: true
      envKey: PANEL_DB_USER
      labelEn: Postgres User
      labelZh: Postgres 数据库用户
      label:
        en: 'Postgres User'
        zh: 'Postgres 数据库用户'
        zh-Hant: 'Postgres 資料庫使用者'
        ja: 'Postgres ユーザー'
        ko: 'Postgres 사용자'
        ru: 'Пользователь Postgres'
        ms: 'Pengguna Postgres'
        pt-br: 'Usuário do Postgres'
      required: true
      rule: paramCommon
      type: text
    - default: immich
      edit: true
      envKey: PANEL_DB_USER_PASSWORD
      labelEn: Postgres Password
      labelZh: Postgres 数据库用户密码
      label:
        en: 'Postgres Password'
        zh: 'Postgres 数据库用户密码'
        zh-Hant: 'Postgres 資料庫使用者密碼'
        ja: 'Postgres パスワード'
        ko: 'Postgres 비밀번호'
        ru: 'Пароль Postgres'
        ms: 'Kata laluan Postgres'
        pt-br: 'Senha do Postgres'
      random: true
      required: true
      rule: paramComplexity
      type: password
