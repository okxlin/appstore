services:
  workstation:
    image: "ghcr.io/okxlin/codex-claude-workstation:latest"
    container_name: ${CONTAINER_NAME}
    hostname: workstation
    restart: always
    labels:
      createdBy: "Apps"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - PASSWORD=${CODE_SERVER_PASSWORD:-change-me}
      - ROOT_PASSWORD=${ROOT_PASSWORD:-codex2024}
    volumes:
      - ${APP_DATA_DIR:-./data}/workspace:/workspace
      - codex-home:/home/dev
      - ${DOCKER_SOCK_SRC:-/var/run/docker.sock}:/var/run/docker.sock
    ports:
      - ${PANEL_APP_PORT_HTTP}:8080
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - 1panel-network

volumes:
  codex-home:
    name: codex-home

networks:
  1panel-network:
    external: true
