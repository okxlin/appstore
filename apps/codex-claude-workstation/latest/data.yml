additionalProperties:
  formFields:
    - envKey: PANEL_APP_PORT_HTTP
      type: number
      required: true
      default: 8080
      rule: paramPort
      labelZh: Web 访问端口
      labelEn: Web Port
      label:
        en: Web Port
        zh: Web 访问端口
        zh-Hant: Web 訪問端口
        ja: Web ポート
        ko: 웹 포트
        ru: Веб-порт
        ms: Port Web
        pt-br: Porta Web
      edit: true
    - envKey: CODE_SERVER_PASSWORD
      type: password
      required: true
      random: true
      default: change-me
      labelZh: code-server 密码
      labelEn: Code-server Password
      label:
        en: Code-server Password
        zh: code-server 密码
        zh-Hant: code-server 密碼
        ja: code-server パスワード
        ko: code-server 비밀번호
        ru: Пароль code-server
        ms: Kata Laluan code-server
        pt-br: Senha do code-server
      edit: true
    - envKey: ROOT_PASSWORD
      type: password
      required: false
      random: true
      default: codex2024
      labelZh: Root 密码
      labelEn: Root Password
      label:
        en: Root Password
        zh: Root 密码
        zh-Hant: Root 密碼
        ja: Root パスワード
        ko: Root 비밀번호
        ru: Пароль Root
        ms: Kata Laluan Root
        pt-br: Senha do Root
      edit: true
    - default: /var/run/docker.sock
      edit: true
      envKey: DOCKER_SOCK_SRC
      type: text
      required: false
      labelEn: Docker Socket Path (leave empty to disable)
      labelZh: Docker 套接字路径（留空禁用）
      label:
        en: Docker Socket Path (leave empty to disable)
        zh: Docker 套接字路径（留空禁用）
        zh-Hant: Docker 套接字路徑（留空禁用）
        ja: Docker ソケットパス（空欄で無効）
        ko: Docker 소켓 경로 (비우면 비활성화)
        ru: Путь к Docker-сокету (оставьте пустым для отключения)
        ms: Laluan soket Docker (kosongkan untuk lumpuhkan)
        pt-br: Caminho do socket Docker (deixe em branco para desabilitar)
    - envKey: APP_DATA_DIR
      type: text
      required: true
      default: ./data
      labelZh: 数据目录
      labelEn: Data Directory
      label:
        en: Data Directory
        zh: 数据目录
        zh-Hant: 數據目錄
        ja: データディレクトリ
        ko: 데이터 디렉토리
        ru: Каталог данных
        ms: Direktori Data
        pt-br: Diretório de Dados
      edit: true
    - default: "false"
      edit: true
      envKey: FIX_WORKSPACE_OWNERSHIP_RECURSIVE
      type: text
      required: true
      labelEn: Recursive Workspace Ownership Repair
      labelZh: 递归修复工作区权限
      label:
        en: Recursive Workspace Ownership Repair
        zh: 递归修复工作区权限
        zh-Hant: 遞歸修復工作區權限
        ja: ワークスペース所有権の再帰修復
        ko: 작업공간 소유권 재귀 복구
        ru: Рекурсивное исправление владельца рабочей области
        ms: Baiki pemilikan ruang kerja secara rekursif
        pt-br: Reparo recursivo de propriedade do workspace
    - default: ./data/custom.env
      edit: true
      envKey: CUSTOM_ENV_FILE
      type: text
      required: false
      labelEn: Custom Env File
      labelZh: 自定义环境变量文件
      label:
        en: Custom Env File
        zh: 自定义环境变量文件
        zh-Hant: 自訂環境變量文件
        ja: カスタム環境変数ファイル
        ko: 사용자 지정 환경 변수 파일
        ru: Пользовательский файл переменных окружения
        ms: Fail env tersuai
        pt-br: Arquivo env personalizado
    - default: ""
      edit: true
      envKey: GITHUB_TOKEN
      type: password
      required: false
      labelEn: GitHub Token
      labelZh: GitHub 访问令牌
      label:
        en: GitHub Token
        zh: GitHub 访问令牌
        zh-Hant: GitHub 存取權杖
        ja: GitHubアクセストークン
        ko: GitHub 액세스 토큰
        ru: Токен доступа GitHub
        ms: Token akses GitHub
        pt-br: Token de acesso do GitHub
    - default: ""
      edit: true
      envKey: GIT_AUTHOR_NAME
      type: text
      required: false
      labelEn: Git Author Name
      labelZh: Git 作者名
      label:
        en: Git Author Name
        zh: Git 作者名
        zh-Hant: Git 作者名
        ja: Git作成者名
        ko: Git 작성자 이름
        ru: Имя автора Git
        ms: Nama pengarang Git
        pt-br: Nome do autor Git
    - default: ""
      edit: true
      envKey: GIT_AUTHOR_EMAIL
      type: text
      required: false
      labelEn: Git Author Email
      labelZh: Git 作者邮箱
      label:
        en: Git Author Email
        zh: Git 作者邮箱
        zh-Hant: Git 作者郵箱
        ja: Git作成者メール
        ko: Git 작성자 이메일
        ru: Email автора Git
        ms: E-mel pengarang Git
        pt-br: Email do autor Git
    - default: ""
      edit: true
      envKey: GIT_COMMITTER_NAME
      type: text
      required: false
      labelEn: Git Committer Name
      labelZh: Git 提交者名
      label:
        en: Git Committer Name
        zh: Git 提交者名
        zh-Hant: Git 提交者名
        ja: Gitコミッター名
        ko: Git 커미터 이름
        ru: Имя коммиттера Git
        ms: Nama komit Git
        pt-br: Nome do committer Git
    - default: ""
      edit: true
      envKey: GIT_COMMITTER_EMAIL
      type: text
      required: false
      labelEn: Git Committer Email
      labelZh: Git 提交者邮箱
      label:
        en: Git Committer Email
        zh: Git 提交者邮箱
        zh-Hant: Git 提交者郵箱
        ja: Gitコミッターメール
        ko: Git 커미터 이메일
        ru: Email коммиттера Git
        ms: E-mel komit Git
        pt-br: Email do committer Git
    - envKey: TZ
      type: text
      required: false
      default: Asia/Shanghai
      labelZh: 时区
      labelEn: Timezone
      label:
        en: Timezone
        zh: 时区
        zh-Hant: 時區
        ja: タイムゾーン
        ko: 시간대
        ru: Часовой пояс
        ms: Zon Waktu
        pt-br: Fuso Horário
      edit: true
