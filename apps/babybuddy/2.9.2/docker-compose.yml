services:
  babybuddy:
    image: "lscr.io/linuxserver/babybuddy:2.9.2"
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8000"
    volumes:
      - "${APP_DATA_DIR}:/config"
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
