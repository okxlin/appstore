networks:
  1panel-network:
    external: true
services:
  calibre-web:
    image: "linuxserver/calibre-web:0.6.26"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8083"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${BOOKS_PATH}:/books"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
    labels:
      createdBy: "Apps"
