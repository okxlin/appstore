additionalProperties:
  formFields:
    - default: postgresql
      envKey: PANEL_DB_TYPE
      labelEn: Database Service
      labelZh: 数据库服务
      label:
        en: 'Database Service'
        zh: '数据库服务'
        zh-Hant: '數據庫服務'
        ja: 'データベースサービス'
        ko: '데이터베이스 서비스'
        ru: 'Сервис базы данных'
        ms: 'Perkhidmatan Pangkalan Data'
        pt-br: 'Serviço de Banco de Dados'
      required: true
      type: apps
      values:
        - label: "PostgreSQL"
          value: postgresql
      child:
        default: ""
        envKey: PANEL_DB_HOST
        required: true
        type: service
    - default: nginxpulse
      envKey: PANEL_DB_NAME
      labelEn: Database
      labelZh: 数据库名
      label:
        en: Database
        ja: データベース
        ms: Pangkalan Data
        pt-br: Banco de Dados
        ru: База данных
        ko: 데이터베이스
        zh: 数据库名
        zh-Hant: 數據庫名
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: nginxpulse
      envKey: PANEL_DB_USER
      labelEn: User
      labelZh: 数据库用户
      label:
        en: User
        ja: ユーザー
        ms: Pengguna
        pt-br: Usuário
        ru: Пользователь
        ko: 사용자
        zh: 数据库用户
        zh-Hant: 數據庫用戶
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: nginxpulse
      envKey: PANEL_DB_USER_PASSWORD
      labelEn: Password
      labelZh: 数据库用户密码
      label:
        en: Password
        ja: パスワード
        ms: Kata laluan
        pt-br: Senha
        ru: Пароль
        ko: 비밀번호
        zh: 数据库用户密码
        zh-Hant: 數據庫用戶密碼
      random: true
      required: true
      type: password
    - default: 8088
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Port
      labelZh: 端口
      label:
        en: 'Port'
        zh: '端口'
        zh-Hant: '埠'
        ja: 'ポート'
        ko: '포트'
        ru: 'Порт'
        ms: 'Port'
        pt-br: 'Porta'
      required: true
      rule: paramPort
      type: number
    - default: /opt/1panel/www/sites
      edit: true
      envKey: LOG_PATH
      labelEn: LOG folder path
      labelZh: Nginx日志路径
      label:
        en: 'Log folder path'
        zh: 'Nginx日志路径'
        zh-Hant: 'Nginx 日誌路徑'
        ja: 'Nginx ログパス'
        ko: 'Nginx 로그 경로'
        ru: 'Путь к журналам Nginx'
        ms: 'Laluan log Nginx'
        pt-br: 'Caminho dos logs do Nginx'
      required: true
      type: text
    - default: ./data/data
      edit: true
      envKey: DATA_PATH
      labelEn: Data folder path
      labelZh: 数据文件夹路径
      label:
        en: 'Data folder path'
        zh: '数据文件夹路径'
        zh-Hant: '資料夾路徑'
        ja: 'データフォルダパス'
        ko: '데이터 폴더 경로'
        ru: 'Путь к папке данных'
        ms: 'Laluan folder data'
        pt-br: 'Caminho da pasta de dados'
      required: true
      type: text
    - default: ./data/configs
      edit: true
      envKey: CONFIGS_PATH
      labelEn: Configs folder path
      labelZh: 配置文件夹路径
      label:
        en: 'Configs folder path'
        zh: '配置文件夹路径'
        zh-Hant: '設定資料夾路徑'
        ja: '設定フォルダパス'
        ko: '설정 폴더 경로'
        ru: 'Путь к папке конфигурации'
        ms: 'Laluan folder konfigurasi'
        pt-br: 'Caminho da pasta de configurações'
      required: true
      type: text
    - default: ""
      edit: true
      envKey: ACCESS_KEYS
      labelEn: ACCESS KEYS
      labelZh: 访问密码
      label:
        en: 'Access Keys'
        zh: '访问密码'
        zh-Hant: '訪問密碼'
        ja: 'アクセスキー'
        ko: '액세스 키'
        ru: 'Ключи доступа'
        ms: 'Kunci akses'
        pt-br: 'Chaves de acesso'
      required: true
      type: text
