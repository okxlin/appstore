      ko: HTTPS 활성화
      ru: Включить HTTPS
      ms: Dayakan HTTPS
      pt-br: Ativar HTTPS
    required: true
    type: select
    values:
    - label: 'false'
      value: 'false'
    - label: 'true'
      value: 'true'
  - default: ''
    edit: true
    envKey: INITIAL_API_KEY
    labelEn: Initial API Key
    labelZh: 初始 API 密钥
    label:
      en: Initial API Key
      zh: 初始 API 密钥
      zh-Hant: 初始 API 金鑰
      ja: 初期 API キー
      ko: 초기 API 키
      ru: Начальный ключ API
      ms: Kunci API Awal
      pt-br: Chave de API inicial
    random: true
    required: true
    rule: paramComplexity
    type: password
  - default: Asia/Shanghai
    edit: true
    envKey: TZ
    labelEn: Timezone
    labelZh: 时区
    label:
      en: Timezone
      zh: 时区
      zh-Hant: 時區
      ja: タイムゾーン
      ko: 시간대
      ru: Часовой пояс
      ms: Zon waktu
      pt-br: Fuso horário
    required: true
    type: text
