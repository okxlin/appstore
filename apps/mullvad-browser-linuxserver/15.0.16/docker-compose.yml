networks:
  1panel-network:
    external: true
services:
  mullvad-browser:
    image: "linuxserver/mullvad-browser:15.0.16"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:3000"
      - "${PANEL_APP_PORT_HTTPS}:3001"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - LOCAL_NET=${LOCAL_NET:-192.168.0.0/16}
      - CUSTOM_USER=${CUSTOM_USER}
      - PASSWORD=${PASSWORD}
      - LC_ALL=${LC_ALL}
    labels:
      createdBy: "Apps"
