        zh: 额外允许的客户端 IP/CIDR 列表
        zh-Hant: 額外允許的用戶端 IP/CIDR 清單
        ja: 追加許可クライアント IP/CIDR リスト
        ko: 추가 허용 클라이언트 IP/CIDR 목록
        ru: Дополнительные разрешенные IP/CIDR
