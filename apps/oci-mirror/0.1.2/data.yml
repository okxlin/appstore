      envKey: OCI_MIRROR_PKI_DIR
      labelEn: mTLS PKI Directory
      labelZh: mTLS PKI 目录
      label:
        en: mTLS PKI Directory
        zh: mTLS PKI 目录
        zh-Hant: mTLS PKI 目錄
        ja: mTLS PKI ディレクトリ
        ko: mTLS PKI 디렉터리
        ru: Каталог PKI mTLS
        ms: Direktori PKI mTLS
        pt-br: Diretório PKI mTLS
      required: true
      type: text
    - default: gateway-1
      edit: true
      envKey: OCI_MIRROR_MTLS_GATEWAY_ID
      labelEn: Gateway mTLS Identity ID
      labelZh: Gateway mTLS 身份 ID
      label:
        en: Gateway mTLS Identity ID
        zh: Gateway mTLS 身份 ID
        zh-Hant: Gateway mTLS 身分 ID
        ja: Gateway mTLS ID
        ko: Gateway mTLS ID
        ru: Идентификатор mTLS Gateway
        ms: ID Identiti mTLS Gateway
        pt-br: ID de Identidade mTLS do Gateway
      required: true
      type: text
    - default: egress-a=egress.example.com
      edit: true
      envKey: OCI_MIRROR_MTLS_EGRESS_CERTS
      labelEn: Egress mTLS Certificate Inventory
      labelZh: Egress mTLS 证书清单
      label:
        en: Egress mTLS Certificate Inventory
        zh: Egress mTLS 证书清单
        zh-Hant: Egress mTLS 憑證清單
        ja: Egress mTLS 証明書インベントリ
        ko: Egress mTLS 인증서 목록
        ru: Список сертификатов mTLS Egress
        ms: Inventori Sijil mTLS Egress
        pt-br: Inventário de Certificados mTLS do Egress
      required: true
      type: text
    - default: ""
      edit: true
      envKey: OCI_MIRROR_MANAGEMENT_TOKEN
      labelEn: Gateway Management Token
      labelZh: Gateway 管理 Token
      label:
        en: Gateway Management Token
        zh: Gateway 管理 Token
        zh-Hant: Gateway 管理 Token
        ja: Gateway 管理 Token
        ko: Gateway 관리 Token
        ru: Токен управления Gateway
        ms: Token Pengurusan Gateway
        pt-br: Token de Gerenciamento do Gateway
      description:
        en: Required only for Gateway. Use 32-4096 bytes containing only A-Z, a-z, 0-9, . _ ~ + / -, with optional = padding only at the end. It must differ from every Egress token.
        zh: 仅 Gateway 必填。使用 32-4096 字节，仅允许 A-Z、a-z、0-9、. _ ~ + / -，= 只能作为末尾填充。必须与所有 Egress Token 不同。
        zh-Hant: 僅 Gateway 必填。使用 32-4096 位元組，僅允許 A-Z、a-z、0-9、. _ ~ + / -，= 只能作為末尾填充。必須與所有 Egress Token 不同。
        ja: Gateway のみ必須です。32～4096 バイトで、A-Z、a-z、0-9、. _ ~ + / - のみ使用できます。= は末尾のパディングにのみ使用でき、すべての Egress Token と異なる値が必要です。
        ko: Gateway에서만 필수입니다. 32-4096바이트이며 A-Z, a-z, 0-9, . _ ~ + / -만 사용할 수 있습니다. =는 끝 패딩에만 사용할 수 있고 모든 Egress Token과 달라야 합니다.
        ru: Обязательно только для Gateway. Длина 32-4096 байт; допустимы A-Z, a-z, 0-9, . _ ~ + / -, а = только в конце. Значение должно отличаться от всех токенов Egress.
        ms: Wajib untuk Gateway sahaja. Gunakan 32-4096 bait yang hanya mengandungi A-Z, a-z, 0-9, . _ ~ + / -, dengan = hanya sebagai pelapik di hujung. Nilai mesti berbeza daripada semua token Egress.
        pt-br: Obrigatório somente para Gateway. Use 32-4096 bytes contendo apenas A-Z, a-z, 0-9, . _ ~ + / -, com = somente como preenchimento no final. O valor deve ser diferente de todos os tokens Egress.
      required: false
      type: password
    - default: egress-a
      edit: true
      envKey: OCI_MIRROR_EGRESS_NODE_ID
      labelEn: Egress Node ID
      labelZh: Egress 节点 ID
      label:
        en: Egress Node ID
        zh: Egress 节点 ID
        zh-Hant: Egress 節點 ID
        ja: Egress ノード ID
        ko: Egress 노드 ID
        ru: ID узла Egress
        ms: ID Nod Egress
        pt-br: ID do Nó Egress
      required: true
      type: text
    - default: https://egress.example.com:8443
      edit: true
      envKey: OCI_MIRROR_EGRESS_PROXY_URL
      labelEn: Egress Proxy URL (HTTPS for mTLS)
      labelZh: Egress 代理 URL（mTLS 使用 HTTPS）
      label:
        en: Egress Proxy URL (HTTPS for mTLS)
        zh: Egress 代理 URL（mTLS 使用 HTTPS）
        zh-Hant: Egress 代理 URL（mTLS 使用 HTTPS）
        ja: Egress プロキシ URL（mTLS は HTTPS）
        ko: Egress 프록시 URL (mTLS는 HTTPS)
        ru: URL прокси Egress (HTTPS для mTLS)
        ms: URL Proksi Egress (HTTPS untuk mTLS)
        pt-br: URL do Proxy Egress (HTTPS para mTLS)
      required: false
      type: text
    - default: ""
      edit: true
      envKey: OCI_MIRROR_EGRESS_SOURCE_ADDRESSES
      labelEn: Egress Public Source Addresses
      labelZh: Egress 公网源地址
      label:
        en: Egress Public Source Addresses
        zh: Egress 公网源地址
        zh-Hant: Egress 公網來源位址
        ja: Egress パブリック送信元アドレス
        ko: Egress 공인 소스 주소
        ru: Публичные исходящие адреса Egress
        ms: Alamat Sumber Awam Egress
        pt-br: Endereços Públicos de Origem do Egress
      description:
        en: Required only for Gateway. Enter comma-separated concrete public IPv4/IPv6 addresses assigned or routed to the Egress host; CIDR prefixes are not accepted. Up to 256 addresses are supported, and IPv6 rotation addresses must use distinct /64 networks.
        zh: 仅 Gateway 必填。填写已分配或路由到 Egress 主机的具体公网 IPv4/IPv6 地址，多个用英文逗号分隔，不接受 CIDR 前缀。最多 256 个，IPv6 轮换地址必须来自不同的 /64。
        zh-Hant: 僅 Gateway 必填。填寫已分配或路由到 Egress 主機的具體公網 IPv4/IPv6 位址，多個以英文逗號分隔，不接受 CIDR 前綴。最多 256 個，IPv6 輪換位址必須來自不同的 /64。
        ja: Gateway のみ必須です。Egress ホストに割り当てまたはルーティングされた具体的な公開 IPv4/IPv6 アドレスをカンマ区切りで入力します。CIDR プレフィックスは使用できません。最大 256 個で、IPv6 ローテーション用アドレスは異なる /64 を使用する必要があります。
        ko: Gateway에서만 필수입니다. Egress 호스트에 할당되었거나 라우팅된 구체적인 공인 IPv4/IPv6 주소를 쉼표로 구분해 입력하세요. CIDR 접두사는 허용되지 않습니다. 최대 256개며 IPv6 순환 주소는 서로 다른 /64를 사용해야 합니다.
        ru: Обязательно только для Gateway. Укажите через запятую конкретные публичные IPv4/IPv6-адреса, назначенные или маршрутизируемые на узел Egress; CIDR-префиксы недопустимы. До 256 адресов; IPv6-адреса для ротации должны быть из разных /64.
        ms: Wajib untuk Gateway sahaja. Masukkan alamat IPv4/IPv6 awam khusus yang diperuntukkan atau dihalakan ke hos Egress, dipisahkan dengan koma; awalan CIDR tidak diterima. Sehingga 256 alamat disokong dan alamat putaran IPv6 mesti menggunakan rangkaian /64 yang berbeza.
        pt-br: Obrigatório somente para Gateway. Informe endereços IPv4/IPv6 públicos concretos atribuídos ou roteados ao host Egress, separados por vírgulas; prefixos CIDR não são aceitos. São suportados até 256 endereços, e os endereços IPv6 de rotação devem usar redes /64 distintas.
      required: false
      type: text
    - default: 0.0.0.0
      edit: true
      envKey: OCI_MIRROR_EGRESS_LISTEN_IP
      labelEn: Egress Listen IP
      labelZh: Egress 监听 IP
      label:
        en: Egress Listen IP
        zh: Egress 监听 IP
        zh-Hant: Egress 監聽 IP
        ja: Egress リッスン IP
        ko: Egress 수신 IP
        ru: IP прослушивания Egress
        ms: IP Dengar Egress
        pt-br: IP de Escuta do Egress
      required: false
      type: text
    - default: https://mirror.example.com:8443
      edit: true
      envKey: OCI_MIRROR_GATEWAY_MANAGEMENT_URL
      labelEn: Gateway Snapshot URL (HTTPS for mTLS)
      labelZh: Gateway 快照 URL（mTLS 使用 HTTPS）
      label:
        en: Gateway Snapshot URL (HTTPS for mTLS)
        zh: Gateway 快照 URL（mTLS 使用 HTTPS）
        zh-Hant: Gateway 快照 URL（mTLS 使用 HTTPS）
        ja: Gateway スナップショット URL（mTLS は HTTPS）
        ko: Gateway 스냅샷 URL (mTLS는 HTTPS)
        ru: URL снимка Gateway (HTTPS для mTLS)
        ms: URL Syot Gateway (HTTPS untuk mTLS)
        pt-br: URL do Snapshot do Gateway (HTTPS para mTLS)
      required: false
      type: text
    - default: ""
      edit: true
      envKey: OCI_MIRROR_GATEWAY_ALLOWED_PEER
      labelEn: Optional Gateway IP/CIDR Filter
      labelZh: 可选的 Gateway IP/CIDR 限制
      label:
        en: Optional Gateway IP/CIDR Filter
        zh: 可选的 Gateway IP/CIDR 限制
        zh-Hant: 可選的 Gateway IP/CIDR 限制
        ja: Gateway IP/CIDR フィルター（任意）
        ko: 선택적 Gateway IP/CIDR 필터
        ru: Необязательный фильтр IP/CIDR Gateway
        ms: Penapis IP/CIDR Gateway Pilihan
        pt-br: Filtro de IP/CIDR do Gateway Opcional
      required: false
      type: text
    - default: ""
      edit: true
      envKey: OCI_MIRROR_EGRESS_TOKEN
      labelEn: Egress Node Token
      labelZh: Egress 节点 Token
      label:
        en: Egress Node Token
        zh: Egress 节点 Token
        zh-Hant: Egress 節點 Token
        ja: Egress ノード Token
        ko: Egress 노드 Token
        ru: Токен узла Egress
        ms: Token Nod Egress
        pt-br: Token do Nó Egress
      description:
        en: Use 32-4096 bytes containing only A-Z, a-z, 0-9, . _ ~ + / -, with optional = padding only at the end. It must differ from the management token and every other Egress token.
        zh: 使用 32-4096 字节，仅允许 A-Z、a-z、0-9、. _ ~ + / -，= 只能作为末尾填充。必须与管理 Token 及其他 Egress Token 不同。
        zh-Hant: 使用 32-4096 位元組，僅允許 A-Z、a-z、0-9、. _ ~ + / -，= 只能作為末尾填充。必須與管理 Token 及其他 Egress Token 不同。
        ja: 32～4096 バイトで、A-Z、a-z、0-9、. _ ~ + / - のみ使用できます。= は末尾のパディングにのみ使用でき、管理 Token および他の Egress Token と異なる値が必要です。
        ko: 32-4096바이트이며 A-Z, a-z, 0-9, . _ ~ + / -만 사용할 수 있습니다. =는 끝 패딩에만 사용할 수 있고 관리 Token 및 다른 Egress Token과 달라야 합니다.
        ru: Длина 32-4096 байт; допустимы A-Z, a-z, 0-9, . _ ~ + / -, а = только в конце. Значение должно отличаться от токена управления и всех других токенов Egress.
        ms: Gunakan 32-4096 bait yang hanya mengandungi A-Z, a-z, 0-9, . _ ~ + / -, dengan = hanya sebagai pelapik di hujung. Nilai mesti berbeza daripada token pengurusan dan semua token Egress lain.
        pt-br: Use 32-4096 bytes contendo apenas A-Z, a-z, 0-9, . _ ~ + / -, com = somente como preenchimento no final. O valor deve ser diferente do token de gerenciamento e de todos os outros tokens Egress.
      required: true
      type: password
    - default: Asia/Shanghai
      edit: true
      envKey: TIME_ZONE
      labelEn: Time Zone
      labelZh: 时区
      label:
        en: Time Zone
        zh: 时区
        zh-Hant: 時區
        ja: タイムゾーン
        ko: 시간대
        ru: Часовой пояс
        ms: Zon Masa
        pt-br: Fuso Horário
      required: true
      type: text
