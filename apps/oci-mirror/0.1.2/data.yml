      envKey: OCI_MIRROR_CHINA_CIDR_FILE
      labelEn: Mainland China CIDR File (Optional)
      labelZh: 中国大陆 CIDR 文件
      label:
        en: Mainland China CIDR File (Optional)
        zh: 中国大陆 CIDR 文件（可选，留空自动生成）
