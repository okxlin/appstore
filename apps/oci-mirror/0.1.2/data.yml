        ja: Gateway TLS ソースディレクトリ
        ko: Gateway TLS 원본 디렉터리
        ru: Каталог исходных TLS-файлов Gateway
        ms: Direktori Sumber TLS Gateway
        pt-br: Diretório de Origem TLS do Gateway
