        zh: Gateway 缓存与状态目录
        zh-Hant: Gateway 快取與狀態目錄
        ja: Gateway キャッシュと状態ディレクトリ
        ko: Gateway 캐시 및 상태 디렉터리
        ru: Каталог кеша и состояния Gateway
