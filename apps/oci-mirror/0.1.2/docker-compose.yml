services:
  oci-mirror:
    image: "moelin/oci-mirror:0.1.2"
    container_name: ${CONTAINER_NAME}
    network_mode: host
    init: true
    working_dir: /tmp
    read_only: true
    restart: unless-stopped
    stop_grace_period: 30s
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    tmpfs:
      - /tmp:size=16m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    command:
      - ${OCI_MIRROR_ROLE}
      - --config
      - /etc/oci-mirror/runtime.json
    environment:
      - TZ=${TIME_ZONE}
      - OCI_MIRROR_MANAGEMENT_TOKEN=${OCI_MIRROR_MANAGEMENT_TOKEN:-}
      - OCI_MIRROR_EGRESS_TOKEN=${OCI_MIRROR_EGRESS_TOKEN}
      - SSL_CERT_FILE=/etc/oci-mirror/pki/trust-bundle.crt
    volumes:
      - ./config:/etc/oci-mirror:ro
      - ${OCI_MIRROR_DATA_DIR}:/var/lib/oci-mirror
    labels:
      createdBy: Apps
      oci-mirror.role: ${OCI_MIRROR_ROLE}
      oci-mirror.service-port: ${PANEL_APP_PORT_HTTP}
      oci-mirror.management-port: ${PANEL_APP_PORT_MANAGEMENT}
