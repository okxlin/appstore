networks:
  1panel-network:
    external: true
services:
  flexget:
    image: "linuxserver/flexget:3.19.25"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:5050"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${DOWNLOADS_PATH}:/data"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - FG_LOG_LEVEL=${FG_LOG_LEVEL}
      - FG_LOG_FILE=/config/flexget.log
      - FG_CONFIG_FILE=/config/.flexget/config.yml
      - FG_WEBUI_PASSWORD=${FG_WEBUI_PASSWORD}
    labels:
      createdBy: "Apps"

