networks:
  1panel-network:
    external: true
services:
  phpmyadmin:
    image: "linuxserver/phpmyadmin:5.2.3"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:80"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - PMA_ARBITRARY=${PMA_ARBITRARY}
      - PMA_ABSOLUTE_URI=${PMA_ABSOLUTE_URI}
    labels:
      createdBy: "Apps"
