additionalProperties:
  formFields:
  - default: 80
    edit: true
    envKey: PANEL_APP_PORT_HTTP
    labelEn: HTTP Port
    labelZh: HTTP 端口
    label:
      en: HTTP Port
      zh: HTTP 端口
      zh-Hant: HTTP 連接埠
      ja: HTTP ポート
      ko: HTTP 포트
      ru: HTTP-порт
      ms: Port HTTP
      pt-br: Porta HTTP
    required: true
    type: number
    rule: paramPort
  - default: ./data/config
    edit: true
    envKey: CONFIG_PATH
    labelEn: Config folder path
    labelZh: 配置文件路径
    label:
      en: Config folder path
      zh: 配置文件路径
      zh-Hant: 設定檔資料夾路徑
      ja: 設定フォルダーのパス
      ko: 설정 폴더 경로
      ru: Путь к папке конфигурации
      ms: Laluan folder konfigurasi
      pt-br: Caminho da pasta de configuração
    required: true
    type: text
  - default: Asia/Shanghai
    edit: true
    envKey: TIME_ZONE
    labelEn: Time zone
    labelZh: 时区
    label:
      en: Time zone
      zh: 时区
      zh-Hant: 時區
      ja: タイムゾーン
      ko: 시간대
      ru: Часовой пояс
      ms: Zon waktu
      pt-br: Fuso horário
    required: true
    type: text
  - default: "1"
    edit: true
    envKey: PMA_ARBITRARY
    labelEn: Allow arbitrary server
    labelZh: 允许任意服务器
    label:
      en: Allow arbitrary server
      zh: 允许任意服务器
      zh-Hant: 允許任意伺服器
      ja: 任意のサーバー接続を許可
      ko: 임의 서버 연결 허용
      ru: Разрешить произвольный сервер
      ms: Benarkan pelayan sebarang
      pt-br: Permitir servidor arbitrario
    required: false
    type: select
    values:
      - label: "1"
        value: "1"
      - label: "0"
        value: "0"
  - default: ''
    edit: true
    envKey: PMA_ABSOLUTE_URI
    labelEn: Public access URL
    labelZh: 公开访问 URL
    label:
      en: Public access URL
      zh: 公开访问 URL
      zh-Hant: 公開存取 URL
      ja: 公開アクセス URL
      ko: 공개 접속 URL
      ru: Публичный URL доступа
      ms: URL akses awam
      pt-br: URL publico de acesso
    required: false
    rule: paramExtUrl
    type: text
