additionalProperties:
  formFields:
    - default: "安装后容器会以 gateway run 常驻运行，并启用 8642 端口的 OpenAI-compatible API 与健康检查。API_SERVER_KEY 用于保护除公开健康检查外的 API，请保持随机且不要泄露；旧版本升级时脚本只会为缺失或空白值生成随机 Key，不覆盖已有配置。至少需要配置 1 个模型提供商 Key；若要直接接入 Telegram，再补 TELEGRAM_BOT_TOKEN。容器使用 HERMES_UID / HERMES_GID（默认 10000:10000）访问数据目录。"
      disabled: true
      envKey: TIPS
      labelEn: Tips
      labelZh: 提示
      label:
        en: Tips
        zh: 提示
        zh-Hant: 提示
        ja: ヒント
        ko: 팁
        ru: Подсказка
        ms: Petua
        pt-br: Dicas
      edit: true
      required: true
      type: text
