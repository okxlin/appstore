networks:
  1panel-network:
    external: true
services:
  piper:
    image: "linuxserver/piper:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_WYOMING}:10200"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - PIPER_VOICE=${PIPER_VOICE}
    labels:
      createdBy: "Apps"
