networks:
  1panel-network:
    external: true
services:
  wikijs:
    image: "linuxserver/wikijs:2.5.314"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:3000"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${DATA_PATH}:/data"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - DB_TYPE=sqlite
    labels:
      createdBy: "Apps"
