        zh: '数据文件夹路径'
        zh-Hant: '資料夾路徑'
        ja: 'データフォルダパス'
        ko: '데이터 폴더 경로'
        ru: 'Путь к папке данных'
        ms: 'Laluan folder data'
        pt-br: 'Caminho da pasta de dados'
      required: true
      type: text
    - default: yourls
      envKey: USERNAME
      labelEn: User
      labelZh: 用户
      label:
        en: 'Username'
        zh: '用户名'
        zh-Hant: '使用者名稱'
        ja: 'ユーザー名'
        ko: '사용자 이름'
