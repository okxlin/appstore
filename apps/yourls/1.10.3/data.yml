      labelZh: 用户密码
      label:
        en: 'Password'
        zh: '密码'
        zh-Hant: '密碼'
        ja: 'パスワード'
        ko: '비밀번호'
        ru: 'Пароль'
        ms: 'Kata laluan'
        pt-br: 'Senha'
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: http://localhost:40037
      edit: true
      envKey: YOURLS_EXTERNAL_URL
      labelEn: External URL
      labelZh: 外部访问地址
      label:
        en: 'External URL'
        zh: '外部访问地址'
        zh-Hant: '外部訪問地址'
        ja: '外部 URL'
        ko: '외부 URL'
        ru: 'Внешний URL'
        ms: 'URL luaran'
        pt-br: 'URL externa'
      required: true
      type: text
