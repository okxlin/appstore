additionalProperties:
  formFields:
    - child:
        default: ""
        envKey: PANEL_DB_HOST
        labelEn: Database Service
        labelZh: 数据库服务
        label:
          en: 'Database Service'
          zh: '数据库服务'
          zh-Hant: '數據庫服務'
          ja: 'データベースサービス'
          ko: '데이터베ース 서비스'
          ru: 'Сервис базы данных'
          ms: 'Perkhidmatan Pangkalan Data'
          pt-br: 'Serviço de Banco de Dados'
        required: true
        type: service
      default: mysql
      labelEn: Database Service
      labelZh: 数据库服务
      label:
          en: 'Database Service'
          zh: '数据库服务'
          zh-Hant: '數據庫服務'
          ja: 'データベースサービス'
          ko: '데이터베이스 서비스'
          ru: 'Сервис базы данных'
          ms: 'Perkhidmatan Pangkalan Data'
          pt-br: 'Serviço de Banco de Dados'
      params:
        - envKey: YOURLS_DB_PORT
          key: mysql
          type: param
          value: "3306"
        - envKey: YOURLS_DB_PORT
          key: postgresql
          type: param
          value: "5432"
      required: true
      type: apps
      values:
        - label: "MySQL"
          value: mysql
    - default: yourls
      envKey: PANEL_DB_NAME
      labelEn: Database
      labelZh: 数据库名
      label:
        en: 'Database'
        zh: '数据库名'
        zh-Hant: '數據庫名'
        ja: 'データベース'
        ko: '데이터베이스'
        ru: 'База данных'
        ms: 'Pangkalan Data'
        pt-br: 'Banco de Dados'
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: yourls
      envKey: PANEL_DB_USER
      labelEn: User
      labelZh: 数据库用户
      label:
        en: 'User'
        zh: '数据库用户'
        zh-Hant: '數據庫用戶'
        ja: 'ユーザー'
        ko: '사용자'
        ru: 'Пользователь'
        ms: 'Pengguna'
        pt-br: 'Usuário'
      random: true
      required: true
      rule: paramCommon
      type: text
