networks:
  1panel-network:
    external: true
services:
  ldap-auth:
    image: "linuxserver/ldap-auth:3.4.7"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:9000"
      - "${PANEL_APP_PORT_AUTH}:8888"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
    labels:
      createdBy: "Apps"
