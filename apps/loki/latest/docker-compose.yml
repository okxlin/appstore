services:
  loki:
    image: "grafana/loki:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:3100"
    command:
      - "-config.file=/etc/loki/loki-config.yaml"
    environment:
      - TZ=${TZ}
    volumes:
      - "./config/loki-config.yaml:/etc/loki/loki-config.yaml:ro"
      - "${APP_DATA_DIR}:/loki"
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
