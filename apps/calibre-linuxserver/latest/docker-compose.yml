networks:
  1panel-network:
    external: true
services:
  calibre:
    image: "linuxserver/calibre:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8080"
      - "${PANEL_APP_PORT_HTTPS}:8181"
      - "${PANEL_APP_PORT_WEBSERVER}:8081"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
    labels:
      createdBy: "Apps"
