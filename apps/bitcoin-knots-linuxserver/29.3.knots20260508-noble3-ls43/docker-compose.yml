networks:
  1panel-network:
    external: true
services:
  bitcoin-knots:
    image: "linuxserver/bitcoin-knots:29.3.knots20260508-noble3-ls43"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:3000"
      - "${PANEL_APP_PORT_HTTPS}:3001"
      - "${PANEL_APP_PORT_RPC}:8333"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
    labels:
      createdBy: "Apps"
