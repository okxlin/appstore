networks:
  1panel-network:
    external: true
services:
  duckdns:
    image: "linuxserver/duckdns:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - SUBDOMAINS=${SUBDOMAINS}
      - TOKEN=${TOKEN}
      - UPDATE_IP=${UPDATE_IP}
      - LOG_FILE=${LOG_FILE}
    labels:
      createdBy: "Apps"
