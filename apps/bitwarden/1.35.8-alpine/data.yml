        ms: 'WebSocket didayakan'
        pt-br: 'WebSocket ativado'
      required: true
      type: select
      values:
        - label: "true"
          value: "true"
        - label: "false"
          value: "false"
    - default: ""
      edit: true
      envKey: ADMIN_TOKEN
      labelEn: Admin Token
      labelZh: 管理员令牌
      label:
        en: 'Admin Token'
        zh: '管理员令牌'
        zh-Hant: '管理員權杖'
        ja: '管理者トークン'
        ko: '관리자 토큰'
        ru: 'Токен администратора'
        ms: 'Token pentadbir'
        pt-br: 'Token de administrador'
      required: false
      type: password
