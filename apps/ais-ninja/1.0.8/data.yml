additionalProperties:
  formFields:
    - child:
        default: ""
        envKey: PANEL_DB_HOST
        labelEn: Database Service
        labelZh: 数据库服务
        label:
          en: 'Database Service'
          zh: '数据库服务'
          zh-Hant: '數據庫服務'
          ja: 'データベースサービス'
          ko: '데이터베이스 서비스'
          ru: 'Сервис базы данных'
          ms: 'Perkhidmatan Pangkalan Data'
          pt-br: 'Serviço de Banco de Dados'
        required: true
        type: service
      default: mysql
      envKey: AIS_PLATFORM
      labelEn: Database Service
      labelZh: 数据库服务
      label:
          en: 'Database Service'
          zh: '数据库服务'
          zh-Hant: '數據庫服務'
          ja: 'データベースサービス'
          ko: '데이터베이스 서비스'
          ru: 'Сервис базы данных'
          ms: 'Perkhidmatan Pangkalan Data'
          pt-br: 'Serviço de Banco de Dados'
      params:
        - envKey: AIS_DB_PORT
          key: mysql
          type: param
          value: "3306"
        - envKey: AIS_DB_PORT
          key: postgresql
          type: param
          value: "5432"
      required: true
      type: apps
      values:
        - label: "MySQL"
          value: mysql
    - default: ais-ninja
      envKey: PANEL_DB_NAME
      labelEn: Database
      labelZh: 数据库名
      label:
        en: 'Database'
        zh: '数据库名'
        zh-Hant: '數據庫名'
        ja: 'データベース'
        ko: '데이터베이스'
        ru: 'База данных'
        ms: 'Pangkalan Data'
        pt-br: 'Banco de Dados'
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: ais-ninja
      envKey: PANEL_DB_USER
      labelEn: User
      labelZh: 数据库用户
      label:
        en: 'User'
        zh: '数据库用户'
        zh-Hant: '數據庫用戶'
        ja: 'ユーザー'
        ko: '사용자'
        ru: 'Пользователь'
        ms: 'Pengguna'
        pt-br: 'Usuário'
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: ais-ninja
      envKey: PANEL_DB_USER_PASSWORD
      labelEn: Password
      labelZh: 数据库用户密码
      label:
        en: 'Password'
        zh: '数据库用户密码'
        zh-Hant: '數據庫用戶密碼'
        ja: 'パスワード'
        ko: '비밀번호'
        ru: 'Пароль'
        ms: 'Kata laluan'
        pt-br: 'Senha'
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: ""
      edit: true
      envKey: REDIS_HOST
      key: redis
      labelEn: Redis Service
      labelZh: Redis服务
      label:
        en: 'Redis Service'
        zh: 'Redis服务'
        zh-Hant: 'Redis 服務'
        ja: 'Redis サービス'
        ko: 'Redis 서비스'
        ru: 'Сервис Redis'
        ms: 'Perkhidmatan Redis'
        pt-br: 'Serviço Redis'
      required: true
      type: service
    - default: "6379"
      edit: true
      envKey: REDIS_PORT
      labelEn: Redis Service Port
      labelZh: Redis服务端口
      label:
        en: 'Redis Service Port'
        zh: 'Redis服务端口'
        zh-Hant: 'Redis 服務埠'
        ja: 'Redis サービスポート'
        ko: 'Redis 서비스 포트'
