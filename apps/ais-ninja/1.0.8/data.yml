        ms: 'Port perkhidmatan Redis'
        pt-br: 'Porta do serviço Redis'
      required: true
      rule: paramPort
      type: number
    - default: ""
      edit: true
      envKey: REDIS_PASS
      labelEn: Redis Service Password
      labelZh: Redis服务密码
      label:
        en: 'Redis Service Password'
        zh: 'Redis服务密码'
        zh-Hant: 'Redis 服務密碼'
        ja: 'Redis サービスパスワード'
        ko: 'Redis 서비스 비밀번호'
        ru: 'Пароль сервиса Redis'
        ms: 'Kata laluan perkhidmatan Redis'
        pt-br: 'Senha do serviço Redis'
      required: true
      rule: paramCommon
      type: password
    - default: 40043
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Port
      labelZh: 端口
      label:
        en: 'Port'
        zh: '端口'
        zh-Hant: '埠'
        ja: 'ポート'
        ko: '포트'
