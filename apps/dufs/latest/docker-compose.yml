services:
  dufs:
    image: "sigoden/dufs:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:5000"
    environment:
      - TZ=${TZ}
      - DUFS_SERVE_PATH=/data
      - DUFS_PORT=5000
      - DUFS_ALLOW_ALL=${DUFS_ALLOW_ALL}
      - DUFS_AUTH=${DUFS_AUTH}
    volumes:
      - "${APP_DATA_DIR}:/data"
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
