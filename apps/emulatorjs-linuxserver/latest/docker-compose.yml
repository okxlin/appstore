networks:
  1panel-network:
    external: true
services:
  emulatorjs:
    image: "linuxserver/emulatorjs:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:3000"
      - "${PANEL_APP_PORT_FRONTEND}:80"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${DATA_PATH}:/data"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - SUBFOLDER=${SUBFOLDER}
    labels:
      createdBy: "Apps"
