additionalProperties:
  formFields:
  - default: 80
    edit: true
    envKey: PANEL_APP_PORT_HTTP
    labelEn: HTTP Port
    labelZh: HTTP 端口
    label:
      en: HTTP Port
      zh: HTTP 端口
      zh-Hant: HTTP 連接埠
      ja: HTTP ポート
      ko: HTTP 포트
      ru: HTTP-порт
      ms: Port HTTP
      pt-br: Porta HTTP
    required: true
    type: number
    rule: paramPort
  - default: 443
    edit: true
    envKey: PANEL_APP_PORT_HTTPS
    labelEn: Https Port
    labelZh: Https 端口
    label:
      en: Https Port
      zh: Https 端口
      zh-Hant: Https 連接埠
      ja: Https ポート
      ko: Https 포트
      ru: Порт Https
      ms: Port Https
      pt-br: Porta Https
    required: true
    type: number
    rule: paramPort
  - default: ./data/config
    edit: true
    envKey: CONFIG_PATH
    labelEn: Config folder path
    labelZh: 配置文件路径
    label:
      en: Config folder path
      zh: 配置文件路径
      zh-Hant: 設定檔資料夾路徑
      ja: 設定フォルダーのパス
      ko: 설정 폴더 경로
      ru: Путь к папке конфигурации
      ms: Laluan folder konfigurasi
      pt-br: Caminho da pasta de configuração
    required: true
    type: text
  - default: "false"
    edit: true
    envKey: NGINX_AUTORELOAD
    labelEn: Auto reload configs
    labelZh: 自动重载配置
    label:
      en: Auto reload configs
      zh: 自动重载配置
      zh-Hant: 自動重新載入設定
      ja: 設定の自動再読み込み
      ko: 설정 자동 다시 불러오기
      ru: Автоперезагрузка конфигурации
      ms: Muat semula konfigurasi automatik
      pt-br: Recarregar configuracoes automaticamente
    required: false
    type: select
    values:
      - label: "true"
        value: "true"
      - label: "false"
        value: "false"
  - default: ''
    edit: true
    envKey: NGINX_AUTORELOAD_WATCHLIST
    labelEn: Auto reload watch paths
    labelZh: 自动重载监听路径
    label:
      en: Auto reload watch paths
      zh: 自动重载监听路径
      zh-Hant: 自動重新載入監看路徑
      ja: 自動再読み込み監視パス
      ko: 자동 다시 불러오기 감시 경로
      ru: Пути наблюдения автоперезагрузки
      ms: Laluan pantauan muat semula
      pt-br: Caminhos monitorados para recarregar
    required: false
    type: text
  - default: Asia/Shanghai
    edit: true
    envKey: TIME_ZONE
    labelEn: Time zone
    labelZh: 时区
    label:
      en: Time zone
      zh: 时区
      zh-Hant: 時區
      ja: タイムゾーン
      ko: 시간대
      ru: Часовой пояс
      ms: Zon waktu
      pt-br: Fuso horário
    required: true
    type: text
