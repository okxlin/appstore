networks:
  1panel-network:
    external: true
services:
  sickchill:
    image: "linuxserver/sickchill:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8081"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${DOWNLOADS_PATH}:/downloads"
      - "${TV_PATH}:/tv"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
    labels:
      createdBy: "Apps"
