networks:
  1panel-network:
    external: true
services:
  resilio-sync:
    image: "linuxserver/resilio-sync:3.1.2"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8888"
      - "${PANEL_APP_PORT_SYNC}:55555"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${DOWNLOADS_PATH}:/downloads"
      - "${SYNC_PATH}:/sync"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
    labels:
      createdBy: "Apps"
