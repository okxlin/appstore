additionalProperties:
  formFields:
  - default: 8000
    edit: true
    envKey: PANEL_APP_PORT_HTTP
    labelEn: HTTP Port
    labelZh: HTTP 端口
    label:
      en: HTTP Port
      zh: HTTP 端口
      zh-Hant: HTTP 連接埠
      ja: HTTP ポート
      ko: HTTP 포트
      ru: HTTP-порт
      ms: Port HTTP
      pt-br: Porta HTTP
    required: true
    type: number
    rule: paramPort
  - default: ./data/config
    edit: true
    envKey: CONFIG_PATH
    labelEn: Config folder path
    labelZh: 配置文件路径
    label:
      en: Config folder path
      zh: 配置文件路径
      zh-Hant: 設定檔資料夾路徑
      ja: 設定フォルダーのパス
      ko: 설정 폴더 경로
      ru: Путь к папке конфигурации
      ms: Laluan folder konfigurasi
      pt-br: Caminho da pasta de configuração
    required: true
    type: text
  - default: admin@example.com
    edit: true
    envKey: SUPERUSER_EMAIL
    labelEn: Admin email
    labelZh: 管理员邮箱
    label:
      en: Admin email
      zh: 管理员邮箱
      zh-Hant: 管理員信箱
      ja: 管理者メール
      ko: 관리자 이메일
      ru: Email администратора
      ms: E-mel pentadbir
      pt-br: Email do administrador
    required: true
    type: text
  - default: netbox-change-me
    edit: true
    envKey: SUPERUSER_PASSWORD
    labelEn: Admin password
    labelZh: 管理员密码
    label:
      en: Admin password
      zh: 管理员密码
      zh-Hant: 管理員密碼
      ja: 管理者パスワード
      ko: 관리자 비밀번호
      ru: Пароль администратора
      ms: Kata laluan pentadbir
      pt-br: Senha do administrador
    required: true
    type: password
    rule: paramComplexity
  - default: "*"
    edit: true
    envKey: ALLOWED_HOST
    labelEn: Allowed host
    labelZh: 允许访问主机
    label:
      en: Allowed host
      zh: 允许访问主机
      zh-Hant: 允許存取主機
      ja: 許可ホスト
      ko: 허용 호스트
      ru: Разрешенный хост
      ms: Hos dibenarkan
      pt-br: Host permitido
    required: true
    type: text
  - default: netbox-change-me
    edit: true
    envKey: DB_PASSWORD
    labelEn: Database password
    labelZh: 数据库密码
    label:
      en: Database password
      zh: 数据库密码
      zh-Hant: 資料庫密碼
      ja: データベースパスワード
      ko: 데이터베이스 비밀번호
      ru: Пароль базы данных
      ms: Kata laluan pangkalan data
      pt-br: Senha do banco de dados
    required: true
    type: password
    rule: paramComplexity
  - default: ''
    edit: true
    envKey: BASE_PATH
    labelEn: Base path
    labelZh: 基础路径
    label:
      en: Base path
      zh: 基础路径
      zh-Hant: 基礎路徑
      ja: ベースパス
      ko: 기본 경로
      ru: Базовый путь
      ms: Laluan asas
      pt-br: Caminho base
    required: false
    type: text
  - default: ''
    edit: true
    envKey: CSRF_TRUSTED_ORIGINS
    labelEn: CSRF trusted origins
    labelZh: CSRF 可信来源
    label:
      en: CSRF trusted origins
      zh: CSRF 可信来源
      zh-Hant: CSRF 可信來源
      ja: CSRF 信頼済みオリジン
      ko: CSRF 신뢰 출처
      ru: Доверенные источники CSRF
      ms: Asal dipercayai CSRF
      pt-br: Origens CSRF confiaveis
    required: false
    type: text
  - default: ./data/db
    edit: true
    envKey: DB_DATA_PATH
    labelEn: Database data path
    labelZh: 数据库数据目录
    label:
      en: Database data path
      zh: 数据库数据目录
      zh-Hant: 資料庫資料目錄
      ja: データベースデータディレクトリ
      ko: 데이터베이스 데이터 디렉터리
      ru: Каталог данных базы
      ms: Laluan data pangkalan data
      pt-br: Caminho de dados do banco
    required: true
    type: text
  - default: ./data/redis
    edit: true
    envKey: REDIS_DATA_PATH
    labelEn: Redis data path
    labelZh: Redis 数据目录
    label:
      en: Redis data path
      zh: Redis 数据目录
      zh-Hant: Redis 資料目錄
      ja: Redis データディレクトリ
      ko: Redis 데이터 디렉터리
      ru: Каталог данных Redis
      ms: Laluan data Redis
      pt-br: Caminho de dados Redis
    required: true
    type: text
  - default: Asia/Shanghai
    edit: true
    envKey: TIME_ZONE
    labelEn: Time zone
    labelZh: 时区
    label:
      en: Time zone
      zh: 时区
      zh-Hant: 時區
      ja: タイムゾーン
      ko: 시간대
      ru: Часовой пояс
      ms: Zon waktu
      pt-br: Fuso horário
    required: true
    type: text
