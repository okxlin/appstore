        ru: 'Секрет'
        ms: 'Rahsia'
        pt-br: 'Segredo'
      random: true
      required: true
      rule: paramComplexity
      type: text
    - default: "true"
      envKey: ALLOW_OPENAPI
      labelEn: Allow OpenAPI
      labelZh: 是否开启OpenAPI
      label:
        en: 'Allow OpenAPI'
