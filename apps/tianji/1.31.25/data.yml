      type: select
      values:
        - label: "true"
          value: "true"
        - label: "false"
          value: "false"
    - default: "false"
      envKey: ALLOW_REGISTER
      labelEn: Allow Register
      labelZh: 是否允许注册
      label:
        en: 'Allow Register'
        zh: '允许注册'
        zh-Hant: '允許註冊'
