        ko: '등록 허용'
        ru: 'Разрешить регистрацию'
        ms: 'Benarkan pendaftaran'
        pt-br: 'Permitir registro'
      required: true
      type: select
      values:
        - label: "true"
          value: "true"
        - label: "false"
          value: "false"
