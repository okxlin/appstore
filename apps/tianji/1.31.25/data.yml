        zh: '数据库用户'
        zh-Hant: '資料庫用戶'
        ja: 'データベースユーザー'
        ko: '데이터베이스 사용자'
        ru: 'Пользователь базы данных'
        ms: 'Pengguna pangkalan data'
        pt-br: 'Usuário do banco de dados'
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: tianji
      envKey: PANEL_DB_USER_PASSWORD
      labelEn: Database Password
      labelZh: 数据库用户密码
      label:
        en: 'Database Password'
        zh: '数据库用户密码'
        zh-Hant: '資料庫用戶密碼'
        ja: 'データベースユーザーパスワード'
