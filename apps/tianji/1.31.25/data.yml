        ms: 'Kata laluan pengguna pangkalan data'
        pt-br: 'Senha do usuário do banco de dados'
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: any-random-text
      edit: true
      envKey: JWT_SECRET
      labelEn: Secret
      labelZh: 秘钥
      label:
