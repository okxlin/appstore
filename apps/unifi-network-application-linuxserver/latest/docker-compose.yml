networks:
  1panel-network:
    external: true
services:
  unifi-network-application:
    image: "linuxserver/unifi-network-application:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    depends_on:
      - unifi-db
    ports:
      - "${PANEL_APP_PORT_HTTPS}:8443"
      - "${PANEL_APP_PORT_STUN}:3478/udp"
      - "${PANEL_APP_PORT_DISCOVERY}:10001/udp"
      - "${PANEL_APP_PORT_INFORM}:8080"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASS=${MONGO_PASS}
      - MONGO_HOST=${MONGO_HOST}
      - MONGO_PORT=${MONGO_PORT}
      - MONGO_DBNAME=${MONGO_DBNAME}
      - MONGO_AUTHSOURCE=${MONGO_AUTHSOURCE}
      - MONGO_TLS=${MONGO_TLS}
      - MEM_LIMIT=${MEM_LIMIT}
      - MEM_STARTUP=${MEM_STARTUP}
    labels:
      createdBy: "Apps"
  unifi-db:
    image: "mongo:8.3"
    restart: always
    networks:
      - 1panel-network
    volumes:
      - "${MONGO_DATA_PATH}:/data/db"
      - "${MONGO_INIT_PATH}/init-mongo.sh:/docker-entrypoint-initdb.d/init-mongo.sh:ro"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS}
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASS=${MONGO_PASS}
      - MONGO_DBNAME=${MONGO_DBNAME}
      - MONGO_AUTHSOURCE=${MONGO_AUTHSOURCE}
    labels:
      createdBy: "Apps"
