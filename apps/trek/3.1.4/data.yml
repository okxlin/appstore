additionalProperties:
  formFields:
    - default: 3000
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Web Port
      labelZh: Web 访问端口
      label:
        en: Web Port
        zh: Web 访问端口
        zh-Hant: Web 存取埠
