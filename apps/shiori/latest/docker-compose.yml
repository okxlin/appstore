services:
  shiori:
    image: "ghcr.io/go-shiori/shiori:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8080"
    environment:
      - TZ=${TZ}
      - SHIORI_DIR=/srv/shiori
    volumes:
      - "${APP_DATA_DIR}:/srv/shiori"
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
