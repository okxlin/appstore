        zh: '数据库用户密码'
        zh-Hant: '數據庫用戶密碼'
        ja: 'パスワード'
        ko: '비밀번호'
        ru: 'Пароль'
        ms: 'Kata laluan'
        pt-br: 'Senha'
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: "40328"
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: HTTP Port
      labelZh: HTTP 端口
      label:
        en: 'HTTP Port'
        zh: 'HTTP 端口'
        zh-Hant: 'HTTP 埠'
        ja: 'HTTP ポート'
        ko: 'HTTP 포트'
        ru: 'HTTP-порт'
        ms: 'Port HTTP'
        pt-br: 'Porta HTTP'
      required: true
      rule: paramPort
