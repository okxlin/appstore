networks:
  1panel-network:
    external: true
services:
  hishtory-server:
    image: "linuxserver/hishtory-server:0.335.20260612"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8080"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - HISHTORY_SQLITE_DB=/config/hishtory.db
    labels:
      createdBy: "Apps"
