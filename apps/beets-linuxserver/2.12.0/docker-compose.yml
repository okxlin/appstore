networks:
  1panel-network:
    external: true
services:
  beets:
    image: "linuxserver/beets:2.12.0"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8337"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${MUSIC_PATH}:/music"
      - "${DOWNLOADS_PATH}:/downloads"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
    labels:
      createdBy: "Apps"
