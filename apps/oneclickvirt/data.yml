  description:
    en: OneClickVirt is an extensible universal virtualization management platform.
      It supports multiple virtualization backends including Docker, LXD, Incus, Podman,
      Containerd, Proxmox VE, QEMU, and KubeVirt, making it easy to provision and
      manage virtual machines and containers.
    zh: OneClickVirt 是一款可扩展的通用虚拟化管理平台，支持 Docker、LXD、Incus、Podman、Containerd、Proxmox
      VE、QEMU、KubeVirt 等多种虚拟化后端，轻松实现虚拟机与容器的创建与管理。
    zh-Hant: OneClickVirt 是一個可擴展的通用虛擬化管理平台，支援 Docker、LXD、Incus、Podman、Containerd、Proxmox
      VE、QEMU、KubeVirt 等多種虛擬化後端。
    ja: OneClickVirtは、拡張可能な汎用仮想化管理プラットフォームです。Docker、LXD、Incus、Podman、Containerd、Proxmox
      VE、QEMU、KubeVirtなど複数の仮想化バックエンドをサポートします。
    ko: OneClickVirt는 확장 가능한 범용 가상화 관리 플랫폼입니다. Docker, LXD, Incus, Podman, Containerd,
      Proxmox VE, QEMU, KubeVirt 등 다양한 가상화 백엔드를 지원합니다.
    ru: OneClickVirt — расширяемая универсальная платформа управления виртуализацией.
      Поддерживает множество бэкендов виртуализации, включая Docker, LXD, Incus, Podman,
      Containerd, Proxmox VE, QEMU и KubeVirt.
    ms: OneClickVirt ialah platform pengurusan virtualisasi universal yang boleh dikembangkan.
      Ia menyokong pelbagai backend virtualisasi termasuk Docker, LXD, Incus, Podman,
      Containerd, Proxmox VE, QEMU dan KubeVirt.
    pt-br: OneClickVirt é uma plataforma extensível de gerenciamento de virtualização.
      Suporta múltiplos backends de virtualização, incluindo Docker, LXD, Incus, Podman,
      Containerd, Proxmox VE, QEMU e KubeVirt.
