services:
  kestra:
    image: "kestra/kestra:latest"
    container_name: ${CONTAINER_NAME}
    user: "0"
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        mkdir -p /app/storage
        chown 1000:1000 /app/storage
        export HOME=/home/kestra USER=kestra LOGNAME=kestra
        exec setpriv --reuid=1000 --regid=1000 --clear-groups -- /app/kestra server standalone
    restart: unless-stopped
    stop_grace_period: 6m
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8080"
    environment:
      KESTRA_CONFIGURATION: |-
        datasources:
          postgres:
            url: jdbc:postgresql://${PANEL_DB_HOST}:${PANEL_DB_PORT}/${PANEL_DB_NAME}
            driverClassName: org.postgresql.Driver
            username: "${PANEL_DB_USER}"
            password: "${PANEL_DB_USER_PASSWORD}"
        kestra:
          server:
            basic-auth:
              username: "${KESTRA_BASIC_AUTH_USERNAME}"
              password: "${KESTRA_BASIC_AUTH_PASSWORD}"
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/storage
          queue:
            type: postgres
          tasks:
            tmp-dir:
              path: /tmp/kestra-wd/tmp
    volumes:
      - "${DATA_PATH}/storage:/app/storage"
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
