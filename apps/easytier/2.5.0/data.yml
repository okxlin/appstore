      type: text
    - default: "./data/config.toml"
      disabled: true
      envKey: CONFIG_FILE_PATH
      labelEn: Configuration file path
      labelZh: 配置文件路径
      label:
        en: 'Configuration file path'
        zh: '配置文件路径'
        zh-Hant: '設定檔路徑'
