      disabled: true
      envKey: CONFIG_FILE_PATH_INTERNAL
      labelEn: Configuration file path(inside container)
      labelZh: 配置文件路径 (容器内部)
      label:
        en: 'Configuration file path(inside container)'
        zh: '配置文件路径 (容器内部)'
