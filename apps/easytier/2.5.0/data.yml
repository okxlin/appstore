      edit: true
      envKey: TIME_ZONE
      labelEn: Time Zone
      labelZh: 时区
      label:
        en: 'Time Zone'
        zh: '时区'
        zh-Hant: '時區'
        ja: 'タイムゾーン'
        ko: '시간대'
        ru: 'Часовой пояс'
        ms: 'Zon masa'
        pt-br: 'Fuso horário'
      required: true
      type: text
