      disabled: true
      envKey: PRIVILEGED_MODE
      labelEn: Privilege mode switch
      labelZh: 特权模式开关
      label:
        en: 'Privilege Mode Switch'
        zh: '特权模式开关'
        zh-Hant: '特權模式開關'
        ja: '特権モード切替'
        ko: '특권 모드 스위치'
