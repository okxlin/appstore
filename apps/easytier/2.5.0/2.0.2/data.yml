      type: text
    - default: "-i <ip> --network-name <用户> --network-secret <密码> -e tcp://<服务器地址>:11010 -l <监听地址>"
      edit: true
      envKey: COMMAND
      labelEn: Command (modified as required)
      labelZh: 命令 (按需修改)
      label:
        en: 'Command'
        zh: '命令'
        zh-Hant: '命令'
        ja: 'コマンド'
        ko: '명령'
        ru: 'Команда'
        ms: 'Perintah'
        pt-br: 'Comando'
