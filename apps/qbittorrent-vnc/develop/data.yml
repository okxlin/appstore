      edit: true
      envKey: MEM_USE
      labelEn: Shared memory footprint (1gb)
      labelZh: 共享内存占用(1gb)
      label:
        en: 'Shared memory footprint (1gb)'
        zh: '共享内存占用(1gb)'
        zh-Hant: '共享記憶體占用 (1GB)'
        ja: '共有メモリ使用量 (1GB)'
        ko: '공유 메모리 사용량 (1GB)'
