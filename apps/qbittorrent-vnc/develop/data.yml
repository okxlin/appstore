        ms: 'Laluan folder muat turun'
        pt-br: 'Caminho da pasta de downloads'
      required: true
      type: text
    - default: kasm_user
      disabled: true
      envKey: HTTP_USER
      labelEn: http auth user
      labelZh: HTTP 用户
      label:
        en: 'http auth user'
        zh: 'HTTP 用户'
        zh-Hant: 'HTTP 認證使用者'
        ja: 'HTTP 認証ユーザー'
        ko: 'HTTP 인증 사용자'
        ru: 'Пользователь HTTP-аутентификации'
        ms: 'Pengguna pengesahan HTTP'
        pt-br: 'Usuário de autenticação HTTP'
      required: true
      type: text
