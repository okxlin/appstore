        ms: 'Port peer (perlu tetapan manual)'
        pt-br: 'Porta de peer (configuração manual necessária)'
      required: true
      rule: paramPort
      type: number
    - default: ./data/downloads
      edit: true
      envKey: DOWNLOAD_PATH
      labelEn: Download folder path
      labelZh: 下载文件夹路径
      label:
        en: 'Download folder path'
        zh: '下载文件夹路径'
        zh-Hant: '下載資料夾路徑'
