      edit: true
      envKey: HTTP_PWD
      labelEn: Access Password
      labelZh: 访问密码
      label:
        en: 'Access Password'
        zh: '访问密码'
        zh-Hant: '存取密碼'
        ja: 'アクセスパスワード'
        ko: '액세스 비밀번호'
