      rule: paramPort
      type: number
    - default: 40140
      edit: true
      envKey: PANEL_APP_PORT_HTTPS
      labelEn: Web VNC Port
      labelZh: Web VNC 端口
      label:
        en: 'Web VNC Port'
        zh: 'Web VNC 端口'
        zh-Hant: 'Web VNC 埠'
