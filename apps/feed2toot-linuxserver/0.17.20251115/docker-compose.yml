networks:
  1panel-network:
    external: true
services:
  feed2toot:
    image: "linuxserver/feed2toot:0.17.20251115"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - FEED_LIMIT=${FEED_LIMIT:-5}
    labels:
      createdBy: "Apps"
