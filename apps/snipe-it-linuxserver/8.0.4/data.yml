      ko: 앱 URL
      ru: URL приложения
      ms: URL aplikasi
      pt-br: URL do aplicativo
    required: true
    type: text
    rule: paramExtUrl
  - default: "false"
    edit: true
    envKey: APP_FORCE_TLS
    labelEn: Force TLS
    labelZh: 强制 TLS
    label:
      en: Force TLS
      zh: 强制 TLS
      zh-Hant: 強制 TLS
