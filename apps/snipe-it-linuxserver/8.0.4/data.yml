    type: text
  - default: base64:K4tN8COBEIginakyKQ4SGfoAskVW1leA/A0qSEDucFQ=
    edit: true
    envKey: APP_KEY
    labelEn: Application key
    labelZh: 应用密钥
    label:
      en: Application key
      zh: 应用密钥
      zh-Hant: 應用金鑰
