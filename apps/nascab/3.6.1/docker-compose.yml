services:
  nascab:
    image: "ypptec/nascab:3.6.1"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:80"
    environment:
      - TZ=${TZ}
    volumes:
      - "${MEDIA_PATH}:/myData"
      - "${STATE_PATH}:/root/.local/share/nascab"
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
