networks:
  1panel-network:
    external: true
services:
  duplicati:
    image: "linuxserver/duplicati:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8200"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${BACKUPS_PATH}:/backups"
      - "${SOURCE_PATH}:/source"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - SETTINGS_ENCRYPTION_KEY=${SETTINGS_ENCRYPTION_KEY}
      - CLI_ARGS=${CLI_ARGS:-}
      - DUPLICATI__WEBSERVICE_PASSWORD=${DUPLICATI_WEBSERVICE_PASSWORD}
    labels:
      createdBy: "Apps"

