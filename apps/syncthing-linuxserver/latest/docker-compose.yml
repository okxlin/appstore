networks:
  1panel-network:
    external: true
services:
  syncthing:
    image: "linuxserver/syncthing:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8384"
      - "${PANEL_APP_PORT_SYNC_TCP}:22000/tcp"
      - "${PANEL_APP_PORT_SYNC_UDP}:22000/udp"
      - "${PANEL_APP_PORT_DISCOVERY}:21027/udp"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${DATA1_PATH}:/data1"
      - "${DATA2_PATH}:/data2"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
    labels:
      createdBy: "Apps"
