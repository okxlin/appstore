additionalProperties:
  formFields:
    - default: 40089
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: HTTP Port
      labelZh: HTTP端口
      label:
        en: 'HTTP Port'
        zh: 'HTTP端口'
        zh-Hant: 'HTTP 埠'
        ja: 'HTTP ポート'
        ko: 'HTTP 포트'
        ru: 'HTTP-порт'
        ms: 'Port HTTP'
        pt-br: 'Porta HTTP'
      required: true
      rule: paramPort
      type: number
