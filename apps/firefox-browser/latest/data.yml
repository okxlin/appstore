      envKey: PANEL_APP_PORT_HTTPS
      labelEn: HTTPS Port
      labelZh: HTTPS端口
      label:
        en: 'HTTPS Port'
        zh: 'HTTPS端口'
        zh-Hant: 'HTTPS 埠'
