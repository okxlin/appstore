networks:
  1panel-network:
    external: true
services:
  msedge:
    image: "linuxserver/msedge:149.0.4022"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:3000"
      - "${PANEL_APP_PORT_HTTPS}:3001"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - EDGE_CLI=${EDGE_CLI:-https://www.linuxserver.io/}
      - CUSTOM_USER=${CUSTOM_USER}
      - PASSWORD=${PASSWORD}
      - TITLE=${TITLE:-Microsoft Edge}
      - LC_ALL=${LC_ALL}
    labels:
      createdBy: "Apps"
