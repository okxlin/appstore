      pt-br: Chave do aplicativo
    required: true
    type: password
    rule: paramComplexity
  - default: bookstack-change-me
    edit: true
    envKey: DB_PASSWORD
    labelEn: Database password
    labelZh: 数据库密码
    label:
      en: Database password
      zh: 数据库密码
      zh-Hant: 資料庫密碼
      ja: データベースパスワード
