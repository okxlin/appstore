services:
  gpt-load:
    image: "ghcr.io/tbphp/gpt-load:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:3001"
    environment:
      - TZ=${TZ}
      - HOST=0.0.0.0
      - PORT=3001
      - AUTH_KEY=${AUTH_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - "${APP_DATA_DIR}:/app/data"
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
