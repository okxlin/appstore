      edit: true
      envKey: OPENCLAW_GATEWAY_BIND
      labelEn: OpenClaw Gateway Bind
      labelZh: OpenClaw 网关绑定
      required: true
      type: select
      values:
        - label: "loopback"
          value: "loopback"
        - label: "lan"
          value: "lan"
