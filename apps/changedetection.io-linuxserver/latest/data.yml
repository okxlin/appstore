additionalProperties:
  formFields:
  - default: 5000
    edit: true
    envKey: PANEL_APP_PORT_HTTP
    labelEn: HTTP Port
    labelZh: HTTP 端口
    label:
      en: HTTP Port
      zh: HTTP 端口
      zh-Hant: HTTP 連接埠
      ja: HTTP ポート
      ko: HTTP 포트
      ru: HTTP-порт
      ms: Port HTTP
      pt-br: Porta HTTP
    required: true
    type: number
    rule: paramPort
  - default: ./data/config
    edit: true
    envKey: CONFIG_PATH
    labelEn: Config folder path
    labelZh: 配置文件路径
    label:
      en: Config folder path
      zh: 配置文件路径
      zh-Hant: 設定檔資料夾路徑
      ja: 設定フォルダーのパス
      ko: 설정 폴더 경로
      ru: Путь к папке конфигурации
      ms: Laluan folder konfigurasi
      pt-br: Caminho da pasta de configuração
    required: true
    type: text
  - default: Asia/Shanghai
    edit: true
    envKey: TIME_ZONE
    labelEn: Time zone
    labelZh: 时区
    label:
      en: Time zone
      zh: 时区
      zh-Hant: 時區
      ja: タイムゾーン
      ko: 시간대
      ru: Часовой пояс
      ms: Zon waktu
      pt-br: Fuso horário
    required: true
    type: text
  - default: ''
    edit: true
    envKey: BASE_URL
    labelEn: Public base URL
    labelZh: 公开基础 URL
    label:
      en: Public base URL
      zh: 公开基础 URL
      zh-Hant: 公開基礎 URL
      ja: 公開ベース URL
      ko: 공개 기본 URL
      ru: Публичный базовый URL
      ms: URL asas awam
      pt-br: URL base publica
    required: false
    rule: paramExtUrl
    type: text
  - default: ''
    edit: true
    envKey: PLAYWRIGHT_DRIVER_URL
    labelEn: Playwright driver URL
    labelZh: Playwright 驱动 URL
    label:
      en: Playwright driver URL
      zh: Playwright 驱动 URL
      zh-Hant: Playwright 驅動 URL
      ja: Playwright ドライバー URL
      ko: Playwright 드라이버 URL
      ru: URL драйвера Playwright
      ms: URL pemacu Playwright
      pt-br: URL do driver Playwright
    required: false
    rule: paramExtUrl
    type: text
