networks:
  1panel-network:
    external: true
services:
  changedetection-io:
    image: "linuxserver/changedetection.io:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:5000"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - BASE_URL=${BASE_URL:-}
    labels:
      createdBy: "Apps"
