services:
  transmission:
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:9091"
      - "${PEER_PORT_VALUE}:${PEER_PORT_VALUE}"
      - "${PEER_PORT_VALUE}:${PEER_PORT_VALUE}/udp"
    volumes:
      - "${CONFIG_PATH:-./data/config}:/config"
      - "${DOWNLOAD_PATH}:/downloads"
      - "${WATCH_PATH}:/watch"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - TRANSMISSION_WEB_HOME=${TRANSMISSION_WEB_HOME:-}
      - USER=${WEBUI_USER}
      - PASS=${WEBUI_PWD}
      - WHITELIST=${WHITELIST:-}
      - PEERPORT=${PEER_PORT_VALUE}
      - HOST_WHITELIST=${HOST_WHITELIST:-}
    image: "linuxserver/transmission:4.1.3"
    labels:  
      createdBy: "Apps"

networks:  
  1panel-network:  
    external: true
