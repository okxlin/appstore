services:
  openlist:
    image: "openlistteam/openlist:v4.1.10-ffmpeg"
    container_name: ${CONTAINER_NAME}
    restart: always
    user: "0:0"
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:5244"
      - "${PANEL_APP_PORT_S3}:5246"
    volumes:
      - "${DATA_PATH}:/opt/openlist/data"
      - "${MOUNT_PATH}:/mnt/data"
    environment:
      - TZ=${TIME_ZONE}
      - PUID=0
      - PGID=0
      - UMASK=022
    labels:
      createdBy: "Apps"
networks:
  1panel-network:
    external: true
