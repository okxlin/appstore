additionalProperties:
  formFields:
  - default: 80
    edit: true
    envKey: PANEL_APP_PORT_HTTP
    labelEn: HTTP Port
    labelZh: HTTP 端口
    label:
      en: HTTP Port
      zh: HTTP 端口
      zh-Hant: HTTP 連接埠
      ja: HTTP ポート
      ko: HTTP 포트
      ru: HTTP-порт
      ms: Port HTTP
      pt-br: Porta HTTP
    required: true
    type: number
    rule: paramPort
  - default: ./data/config
    edit: true
    envKey: CONFIG_PATH
    labelEn: Config folder path
    labelZh: 配置文件路径
    label:
      en: Config folder path
      zh: 配置文件路径
      zh-Hant: 設定檔資料夾路徑
      ja: 設定フォルダーのパス
      ko: 설정 폴더 경로
      ru: Путь к папке конфигурации
      ms: Laluan folder konfigurasi
      pt-br: Caminho da pasta de configuração
    required: true
    type: text
  - default: Asia/Shanghai
    edit: true
    envKey: TIME_ZONE
    labelEn: Time zone
    labelZh: 时区
    label:
      en: Time zone
      zh: 时区
      zh-Hant: 時區
      ja: タイムゾーン
      ko: 시간대
      ru: Часовой пояс
      ms: Zon waktu
      pt-br: Fuso horário
    required: true
    type: text
  - default: linuxserver-change-me
    edit: true
    envKey: PASSWORD
    labelEn: Results database password
    labelZh: 结果数据库密码
    label:
      en: Results database password
      zh: 结果数据库密码
      zh-Hant: 結果資料庫密碼
      ja: 結果データベースのパスワード
      ko: 결과 데이터베이스 비밀번호
      ru: Пароль базы данных результатов
      ms: Kata laluan pangkalan data keputusan
      pt-br: Senha do banco de dados de resultados
    random: true
    required: true
    rule: paramComplexity
    type: password
  - default: "false"
    edit: true
    envKey: CUSTOM_RESULTS
    labelEn: Custom results page
    labelZh: 自定义结果页
    label:
      en: Custom results page
      zh: 自定义结果页
      zh-Hant: 自訂結果頁
      ja: カスタム結果ページ
      ko: 사용자 지정 결과 페이지
      ru: Пользовательская страница результатов
      ms: Halaman keputusan tersuai
      pt-br: Pagina de resultados personalizada
    required: true
    type: select
    values:
    - label: "false"
      value: "false"
    - label: "true"
      value: "true"
  - default: ""
    edit: true
    envKey: IPINFO_APIKEY
    labelEn: IPInfo access token
    labelZh: IPInfo 访问令牌
    label:
      en: IPInfo access token
      zh: IPInfo 访问令牌
      zh-Hant: IPInfo 存取權杖
      ja: IPInfo アクセストークン
      ko: IPInfo 액세스 토큰
      ru: Токен доступа IPInfo
      ms: Token akses IPInfo
      pt-br: Token de acesso IPInfo
    required: false
    type: password

