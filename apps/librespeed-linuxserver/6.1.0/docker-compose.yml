networks:
  1panel-network:
    external: true
services:
  librespeed:
    image: "linuxserver/librespeed:6.1.0"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:80"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - PASSWORD=${PASSWORD}
      - CUSTOM_RESULTS=${CUSTOM_RESULTS}
      - DB_TYPE=sqlite
      - IPINFO_APIKEY=${IPINFO_APIKEY:-}
    labels:
      createdBy: "Apps"
