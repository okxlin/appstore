services:
  nt-guacd:
    container_name: ${CONTAINER_NAME}-guacd
    restart: always
    networks:
      - 1panel-network
    volumes:
      - "${DATA_PATH}:/usr/local/next-terminal/data"
    image: dushixiang/guacd:1.6.0@sha256:40872b125c3d946314bd322a3a54325ee2d9a58ecd788f76720ca11874548e42
    labels:
      createdBy: "Apps"

  next-terminal:
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8088"
      - "${PANEL_APP_PORT_SSH}:2022"
    volumes:
      - "${DATA_PATH}:/usr/local/next-terminal/data"
      - "${DATA_PATH}/logs:/usr/local/next-terminal/logs"
      - "${DATA_PATH}/config.yaml:/etc/next-terminal/config.yaml:ro"
      - "/etc/localtime:/etc/localtime:ro"
    depends_on:
      nt-guacd:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8088/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    image: dushixiang/next-terminal:v3.5.2@sha256:4e095f8a0309878e2966d3157af5667b6911b6890d5e4c4abfa5116e0209ca3e
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
