services:
  nt-guacd:
    container_name: ${CONTAINER_NAME}-guacd
    restart: always
    networks:
      - 1panel-network
    volumes:
      - "${DATA_PATH}:/usr/local/next-terminal/data"
    image: dushixiang/guacd:1.6.0
    labels:
      createdBy: "Apps"

  nt-postgresql:
    container_name: ${CONTAINER_NAME}-postgresql
    restart: always
    networks:
      - 1panel-network
    environment:
      - POSTGRES_DB=${PANEL_DB_NAME}
      - POSTGRES_USER=${PANEL_DB_USER}
      - POSTGRES_PASSWORD=${PANEL_DB_USER_PASSWORD}
    volumes:
      - "${DATA_PATH}/postgresql:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PANEL_DB_USER} -d ${PANEL_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    image: postgres:16.4
    labels:
      createdBy: "Apps"

  next-terminal:
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8088"
      - "${PANEL_APP_PORT_SSH}:2022"
    volumes:
      - "${DATA_PATH}:/usr/local/next-terminal/data"
      - "${DATA_PATH}/logs:/usr/local/next-terminal/logs"
      - "${DATA_PATH}/config.yaml:/etc/next-terminal/config.yaml:ro"
      - "/etc/localtime:/etc/localtime:ro"
    depends_on:
      nt-postgresql:
        condition: service_healthy
      nt-guacd:
        condition: service_started
    image: dushixiang/next-terminal:v3.1.1
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
