additionalProperties:
  formFields:
    - default: mysql
      envKey: PANEL_DB_TYPE
      labelEn: Database Service
      labelZh: 数据库服务
      label:
        en: 'Database Service'
        zh: '数据库服务'
        zh-Hant: '數據庫服務'
        ja: 'データベースサービス'
        ko: '데이터베이스 서비스'
        ru: 'Сервис базы данных'
        ms: 'Perkhidmatan Pangkalan Data'
        pt-br: 'Serviço de Banco de Dados'
      required: true
      type: apps
      values:
        - label: "MySQL"
          value: mysql
        - label: "LocalMySQL"
          value: localmysql
      child:
        default: ""
        envKey: PANEL_DB_HOST
        labelEn: Database Service
        labelZh: 数据库服务
        label:
          en: 'Database Service'
          zh: '数据库服务'
          zh-Hant: '數據庫服務'
          ja: 'データベースサービス'
          ko: '데이터베이스 서비스'
          ru: 'Сервис базы данных'
          ms: 'Perkhidmatan Pangkalan Data'
          pt-br: 'Serviço de Banco de Dados'
        required: true
        type: service
    - default: mysql_root_password
      envKey: PANEL_DB_ROOT_PASSWORD
      labelEn: Database root password
      labelZh: 数据库 root 密码
      label:
        en: 'Database root password'
        zh: '数据库 root 密码'
        zh-Hant: '資料庫 root 密碼'
        ja: 'データベースの root パスワード'
        ko: '데이터베이스 root 비밀번호'
        ru: 'Пароль root базы данных'
        ms: 'Kata laluan root pangkalan data'
        pt-br: 'Senha root do banco de dados'
      random: false
      edit: true
      required: true
      rule: paramComplexity
      type: password
    - default: admin@localhost.com
      edit: true
      envKey: ADMIN_EMAIL
      labelEn: Admin email
      labelZh: 管理员邮箱
      label:
        en: 'Admin email'
        zh: '管理员邮箱'
        zh-Hant: '管理員郵箱'
        ja: '管理者メール'
        ko: '관리자 이메일'
        ru: 'Электронная почта администратора'
        ms: 'E-mel pentadbir'
        pt-br: 'E-mail do administrador'
      required: true
      type: text
    - default: seafile
      edit: true
      envKey: ADMIN_PASSWORD
      labelEn: Admin password
      labelZh: 管理员密码
      label:
        en: 'Admin password'
        zh: '管理员密码'
        zh-Hant: '管理員密碼'
        ja: '管理者パスワード'
        ko: '관리자 비밀번호'
        ru: 'Пароль администратора'
        ms: 'Kata laluan pentadbir'
        pt-br: 'Senha de administrador'
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: 40130
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: HTTP Port
      labelZh: HTTP端口
      label:
        en: 'HTTP Port'
        zh: 'HTTP端口'
        zh-Hant: 'HTTP 埠'
        ja: 'HTTP ポート'
        ko: 'HTTP 포트'
        ru: 'HTTP-порт'
        ms: 'Port HTTP'
        pt-br: 'Porta HTTP'
      required: true
      rule: paramPort
      type: number
    - default: ./data
      edit: true
      envKey: DATA_PATH
      labelEn: Data folder path
      labelZh: 数据文件夹路径
      label:
        en: 'Data folder path'
        zh: '数据文件夹路径'
        zh-Hant: '資料夾路徑'
        ja: 'データフォルダパス'
        ko: '데이터 폴더 경로'
        ru: 'Путь к папке данных'
        ms: 'Laluan folder data'
        pt-br: 'Caminho da pasta de dados'
      required: true
      type: text
    - default: Asia/Shanghai
      edit: true
      envKey: TIME_ZONE
      labelEn: Time zone
      labelZh: 时区
      label:
        en: 'Time zone'
        zh: '时区'
        zh-Hant: '時區'
        ja: 'タイムゾーン'
        ko: '시간대'
        ru: 'Часовой пояс'
        ms: 'Zon masa'
        pt-br: 'Fuso horário'
      required: true
      type: text
    - default: memcached
      envKey: MEMCACHED_TYPE
      labelEn: Memcached Service
      labelZh: Memcached 服务
      label:
        en: 'Memcached Service'
        zh: 'Memcached 服务'
        zh-Hant: 'Memcached 服務'
        ja: 'Memcached サービス'
        ko: 'Memcached 서비스'
        ru: 'Сервис Memcached'
        ms: 'Perkhidmatan Memcached'
        pt-br: 'Serviço Memcached'
      required: true
      type: apps
      values:
        - label: "Memcached"
          value: memcached
        - label: "LocalMemcached"
          value: localmemcached
      child:
        default: ""
        envKey: MEMCACHED_HOST
        labelEn: Memcached Service
        labelZh: Memcached 服务
        label:
          en: 'Memcached Service'
          zh: 'Memcached 服务'
          zh-Hant: 'Memcached 服務'
          ja: 'Memcached サービス'
          ko: 'Memcached 서비스'
          ru: 'Сервис Memcached'
          ms: 'Perkhidmatan Memcached'
          pt-br: 'Serviço Memcached'
        required: true
        type: service
    - default: localhost.com
      edit: true
      envKey: SERVER_HOSTNAME
      labelEn: Server hostname (Domain or IP)
      labelZh: 服务端主机名 (域名 或 IP)
      label:
        en: 'Server hostname (Domain or IP)'
        zh: '服务端主机名 (域名 或 IP)'
        zh-Hant: '伺服器主機名稱（網域或 IP）'
        ja: 'サーバーホスト名（ドメインまたはIP）'
        ko: '서버 호스트명(도메인 또는 IP)'
        ru: 'Имя хоста сервера (домен или IP)'
        ms: 'Nama hos pelayan (Domain atau IP)'
        pt-br: 'Nome do host do servidor (Domínio ou IP)'
      required: true
      type: text
