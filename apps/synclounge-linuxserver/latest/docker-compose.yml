networks:
  1panel-network:
    external: true
services:
  synclounge:
    image: "linuxserver/synclounge:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8088"
    environment:
      - AUTH_LIST=${AUTH_LIST:-}
    labels:
      createdBy: "Apps"
