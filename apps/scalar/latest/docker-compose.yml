services:
  scalar:
    image: "scalarapi/api-reference:latest"
    container_name: ${CONTAINER_NAME}
    ports:
      - "${PANEL_APP_PORT_HTTP}:8080"
    volumes:
      - ./data/docs:/docs:ro
    labels:
      createdBy: "Apps"
    restart: unless-stopped
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true
