      envKey: TZ
      labelEn: Timezone
      labelZh: 时区
      label: {en: Timezone, zh: 时区, zh-Hant: 時區, ja: タイムゾーン, ko: 시간대, ru: Часовой пояс, ms: Zon Waktu, pt-br: Fuso horário}
      required: true
      type: text
