networks:
  1panel-network:
    external: true
services:
  jellyfin:
    image: "linuxserver/jellyfin:10.11.11"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8096"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${TVSHOWS_PATH}:/data/tvshows"
      - "${MOVIES_PATH}:/data/movies"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - JELLYFIN_PublishedServerUrl=${PUBLISHED_SERVER_URL:-}
    labels:
      createdBy: "Apps"

