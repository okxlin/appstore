networks:
  1panel-network:
    external: true
services:
  openvscode-server:
    image: "linuxserver/openvscode-server:1.109.5"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:3000"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - CONNECTION_TOKEN=${CONNECTION_TOKEN}
    labels:
      createdBy: "Apps"
