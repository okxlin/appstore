    rule: paramComplexity
  - default: fleet-admin-secret-change-me
    edit: true
    envKey: FLEET_ADMIN_SECRET
    labelEn: Admin secret
    labelZh: 管理员密钥
    label:
      en: Admin secret
      zh: 管理员密钥
      zh-Hant: 管理員金鑰
      ja: 管理者シークレット
      ko: 관리자 시크릿
      ru: Секрет администратора
      ms: Rahsia pentadbir
      pt-br: Segredo do administrador
    required: true
    type: password
    rule: paramComplexity
  - default: ./data/db
    edit: true
    envKey: DB_DATA_PATH
    labelEn: Database data path
    labelZh: 数据库数据目录
    label:
      en: Database data path
      zh: 数据库数据目录
      zh-Hant: 資料庫資料目錄
