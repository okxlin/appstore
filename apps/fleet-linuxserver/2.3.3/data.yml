      en: Config folder path
      zh: 配置文件路径
      zh-Hant: 設定檔資料夾路徑
      ja: 設定フォルダーのパス
      ko: 설정 폴더 경로
      ru: Путь к папке конфигурации
      ms: Laluan folder konfigurasi
      pt-br: Caminho da pasta de configuração
    required: true
    type: text
  - default: fleet-change-me
    edit: true
    envKey: DB_PASSWORD
    labelEn: Database password
    labelZh: 数据库密码
    label:
      en: Database password
      zh: 数据库密码
      zh-Hant: 資料庫密碼
      ja: データベースパスワード
      ko: 데이터베이스 비밀번호
      ru: Пароль базы данных
      ms: Kata laluan pangkalan data
      pt-br: Senha do banco de dados
