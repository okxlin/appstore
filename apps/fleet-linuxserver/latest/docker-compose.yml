networks:
  1panel-network:
    external: true
services:
  fleet:
    image: "linuxserver/fleet:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8080"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - fleet_admin_authentication_type=DATABASE
      - fleet_database_url=jdbc:mariadb://fleet-db:3306/fleet
      - fleet_database_username=fleet
      - fleet_database_password=${DB_PASSWORD}
      - fleet_admin_secret=${FLEET_ADMIN_SECRET}
    depends_on:
      - fleet-db
    labels:
      createdBy: "Apps"
  fleet-db:
    image: "mariadb:11.4"
    restart: always
    networks:
      - 1panel-network
    volumes:
      - "${DB_DATA_PATH}:/var/lib/mysql"
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_PASSWORD}
      - MARIADB_DATABASE=fleet
      - MARIADB_USER=fleet
      - MARIADB_PASSWORD=${DB_PASSWORD}
    labels:
      createdBy: "Apps"
