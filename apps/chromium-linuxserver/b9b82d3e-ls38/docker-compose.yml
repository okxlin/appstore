networks:
  1panel-network:
    external: true
services:
  chromium:
    image: "linuxserver/chromium:b9b82d3e-ls38"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:3000"
      - "${PANEL_APP_PORT_HTTPS}:3001"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - CUSTOM_USER=${CUSTOM_USER}
      - PASSWORD=${PASSWORD}
      - TITLE=${TITLE:-Chromium}
      - DASHBOARD=${DASHBOARD:-selkies-dashboard}
      - LC_ALL=${LC_ALL}
      - CHROME_CLI=${CHROME_CLI:-https://www.linuxserver.io/}
    shm_size: "1gb"
    labels:
      createdBy: "Apps"
