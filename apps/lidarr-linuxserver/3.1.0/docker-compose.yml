networks:
  1panel-network:
    external: true
services:
  lidarr:
    image: "linuxserver/lidarr:3.1.0"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8686"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${MUSIC_PATH}:/music"
      - "${DOWNLOAD_PATH}:/downloads"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
    labels:
      createdBy: "Apps"
