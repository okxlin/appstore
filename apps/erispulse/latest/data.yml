additionalProperties:
  formFields:
    - default: "8000"
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Port
      labelZh: 端口
      label:
        en: Port
        zh: 端口
        zh-Hant: 埠
        ja: ポート
        ko: 포트
      required: true
      rule: paramPort
      type: number
    - default: "./data"
      edit: true
      envKey: DATA_PATH
      labelEn: Data Path
      labelZh: 数据路径
      label:
        en: Data Path
        zh: 数据路径
        zh-Hant: 資料路徑
        ja: データパス
        ko: 데이터 경로
      required: true
      type: text
    - default: "Asia/Shanghai"
      edit: true
      envKey: TIME_ZONE
      labelEn: Timezone
      labelZh: 时区
      label:
        en: Timezone
        zh: 时区
        zh-Hant: 時區
        ja: タイムゾーン
        ko: 시간대
      required: true
      type: text
    - default: ""
      edit: true
      envKey: ERISPULSE_DASHBOARD_TOKEN
      labelEn: Dashboard Token
      labelZh: Dashboard 登录令牌
      label:
        en: Dashboard Login Token
        zh: Dashboard 登录令牌
        zh-Hant: Dashboard 登入令牌
        ja: ダッシュボードログイントークン
        ko: 대시보드 로그인 토큰
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: "stable"
      edit: true
      envKey: ERISPULSE_CHANNEL_SELECT
      labelEn: Update Channel
      labelZh: 更新频道
      label:
        en: Update Channel
        zh: 更新频道
        zh-Hant: 更新頻道
        ja: アップデートチャンネル
        ko: 업데이트 채널
      required: true
      type: select
      values:
        - label: 稳定版 (Stable)
          value: "stable"
        - label: 开发版 (Dev)
          value: "dev"
    - default: "false"
      edit: true
      envKey: ERISPULSE_UPDATE_ON_START
      labelEn: Auto Update on Start
      labelZh: 启动时自动更新
      label:
        en: Auto Update on Start
        zh: 启动时自动更新
        zh-Hant: 啟動時自動更新
        ja: 起動時自動更新
        ko: 시작 시 자동 업데이트
      required: true
      type: select
      values:
        - label: 关闭 (Disabled)
          value: "false"
        - label: 开启 (Enabled)
          value: "true"
