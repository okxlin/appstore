additionalProperties:
  formFields:
    - type: "number"
      labelZh: "端口"
      labelEn: "Port"
      label:
        zh: "端口"
        zh-Hant: "埠"
        en: "Port"
        ja: "ポート"
        ko: "포트"
        ru: "Порт"
        ms: "Port"
        pt-br: "Porta"
      description:
        zh: "设置应用的 HTTP 访问端口，有效范围：1-65535"
        zh-Hant: "設定應用程式的 HTTP 存取埠，有效範圍：1-65535"
        en: "Set the HTTP access port for the application, valid range: 1-65535"
        ja: "アプリケーションのHTTPアクセスポートを設定します。有効範囲：1-65535"
        ko: "애플리케이션의 HTTP 접근 포트를 설정합니다. 유효 범위: 1-65535"
      required: true
      envKey: "PANEL_APP_PORT_HTTP"
      default: "8000"
      edit: true
      rule: "paramPort"

    - type: "text"
      labelZh: "数据路径"
      labelEn: "Data Path"
      label:
        zh: "数据路径"
        zh-Hant: "資料路徑"
        en: "Data Path"
        ja: "データパス"
        ko: "데이터 경로"
        ru: "Путь к данным"
        ms: "Laluan Data"
        pt-br: "Caminho dos dados"
      description:
        zh: "配置文件的存储路径，用于持久化应用数据"
        zh-Hant: "配置檔案的儲存路徑，用於持久化應用程式資料"
        en: "Storage path for configuration files, used for data persistence"
        ja: "設定ファイルの保存パス、アプリケーションデータの永続化に使用"
        ko: "구성 파일의 저장 경로, 데이터 지속성에 사용"
      required: true
      envKey: "DATA_PATH"
      default: "./data"
      edit: true

    - type: "text"
      labelZh: "时区"
      labelEn: "Timezone"
      label:
        zh: "时区"
        zh-Hant: "時區"
        en: "Timezone"
        ja: "タイムゾーン"
        ko: "시간대"
        ru: "Часовой пояс"
        ms: "Zon waktu"
        pt-br: "Fuso horário"
      description:
        zh: "容器时区设置，影响日志和时间显示"
        zh-Hant: "容器時區設定，影響日誌和時間顯示"
        en: "Container timezone setting, affects logs and time display"
        ja: "コンテナのタイムゾーン設定、ログと時刻表示に影響"
        ko: "컨테이너 시간대 설정, 로그 및 시간 표시에 영향"
      required: true
      envKey: "TIME_ZONE"
      default: "Asia/Shanghai"
      edit: true

    - type: "password"
      labelZh: "Dashboard 登录令牌"
      labelEn: "Dashboard Token"
      label:
        zh: "Dashboard 登录令牌"
        zh-Hant: "Dashboard 登入令牌"
        en: "Dashboard Login Token"
        ja: "ダッシュボードログイントークン"
        ko: "대시보드 로그인 토큰"
        ru: "Токен панели"
        ms: "Token Dashboard"
        pt-br: "Token do Dashboard"
      description:
        zh: "Dashboard 登录密码，安装后用于访问 Web 管理面板"
        zh-Hant: "Dashboard 登入密碼，安裝後用於存取 Web 管理面板"
        en: "Dashboard login password, used to access the web management panel after installation"
        ja: "ダッシュボードのログインパスワード、インストール後にWeb管理パネルにアクセスするために使用"
        ko: "대시보드 로그인 비밀번호, 설치 후 웹 관리 패널 액세스에 사용"
      required: true
      envKey: "ERISPULSE_DASHBOARD_TOKEN"
      default: ""
      edit: true
      random: true
      rule: "paramComplexity"

    - type: "select"
      labelZh: "界面语言"
      labelEn: "Language"
      label:
        zh: "界面语言"
        zh-Hant: "界面語言"
        en: "Language"
        ja: "インターフェース言語"
        ko: "인터페이스 언어"
        ru: "Язык интерфейса"
        ms: "Bahasa antara muka"
        pt-br: "Idioma da interface"
      description:
        zh: "Docker 启动界面及日志的显示语言，选择自动则由系统 LANG 环境变量决定。框架更新请在 Dashboard 内完成"
        zh-Hant: "Docker 啟動界面及日誌的顯示語言，選擇自動則由系統 LANG 環境變數決定。框架更新請在 Dashboard 內完成"
        en: "Display language for Docker startup banner and logs. Auto detects from system LANG env. Framework updates via Dashboard"
        ja: "Docker起動画面とログの表示言語。自動はシステムLANG環境変数から検出。フレームワークの更新はDashboardから"
        ko: "Docker 시작 화면 및 로그의 표시 언어. 자동은 시스템 LANG 환경 변수에서 감지. 프레임워크 업데이트는 Dashboard에서"
      required: false
      envKey: "ERISPULSE_LANG"
      default: ""
      edit: true
      values:
        - label: "自动检测 (Auto)"
          value: ""
        - label: "简体中文 (zh)"
          value: "zh"
        - label: "繁體中文 (zh_TW)"
          value: "zh_TW"
        - label: "English (en)"
          value: "en"
        - label: "日本語 (ja)"
          value: "ja"
        - label: "Русский (ru)"
          value: "ru"
