services:
  microwarp:
    image: "ghcr.io/ccbkkb/microwarp:latest"
    container_name: ${CONTAINER_NAME}
    labels:
      createdBy: "Apps"
    ports:
      - "${PANEL_APP_PORT_SOCKS5}:${BIND_PORT}"
    environment:
      - TZ=${TZ}
      - BIND_ADDR=0.0.0.0
      - BIND_PORT=${BIND_PORT}
      - ROTATE_INTERVAL_MINUTES=${ROTATE_INTERVAL_MINUTES}
      - TEST_URL=${TEST_URL}
      - SOCKS_USER=${SOCKS_USER:-}
      - SOCKS_PASS=${SOCKS_PASS:-}
      - ENDPOINT_IP=${ENDPOINT_IP:-}
      - GH_PROXY=${GH_PROXY:-}
      - TAILSCALE_CIDR=${TAILSCALE_CIDR:-100.64.0.0/10}
      - MTU=${MTU}
      - WARP_WGCF_CONF=${WARP_WGCF_CONF:-}
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - "${APP_DATA_DIR_1}:/etc/wireguard"
      - "./rotate.sh:/usr/local/bin/rotate.sh:ro"
    restart: always
    command: ["/bin/sh", "/usr/local/bin/rotate.sh"]
    networks:
      - 1panel-network

  http-proxy:
    image: "gogost/gost:latest"
    container_name: ${CONTAINER_NAME}-http
    labels:
      createdBy: "Apps"
    depends_on:
      - microwarp
    command:
      - "-L"
      - "http://0.0.0.0:8080"
      - "-F"
      - "socks5://microwarp:${BIND_PORT}"
    ports:
      - "${PANEL_APP_PORT_HTTP_PROXY}:8080"
    restart: always
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true
