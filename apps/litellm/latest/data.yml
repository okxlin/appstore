additionalProperties:
  formFields:
    - default: 4000
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: HTTP Port
      labelZh: HTTP 端口
      label:
        en: HTTP Port
        zh: HTTP 端口
        zh-Hant: HTTP 連接埠
        ja: HTTP ポート
        ko: HTTP 포트
        ru: HTTP-порт
        ms: Port HTTP
        pt-br: Porta HTTP
      required: true
      rule: paramPort
      type: number
    - default: postgresql
      envKey: PANEL_DB_TYPE
      labelEn: Database Runtime
      labelZh: 数据库 Runtime
      label:
        en: Database Runtime
        zh: 数据库 Runtime
        zh-Hant: 資料庫 Runtime
        ja: データベース Runtime
        ko: 데이터베이스 Runtime
        ru: Среда базы данных
        ms: Runtime Pangkalan Data
        pt-br: Runtime de banco de dados
      required: true
      type: apps
      values:
        - label: PostgreSQL
          value: postgresql
      child:
        default: ""
        envKey: PANEL_DB_HOST
        labelEn: PostgreSQL Service
        labelZh: PostgreSQL 服务
        label:
          en: PostgreSQL Service
          zh: PostgreSQL 服务
          zh-Hant: PostgreSQL 服務
          ja: PostgreSQL サービス
          ko: PostgreSQL 서비스
          ru: Сервис PostgreSQL
          ms: Perkhidmatan PostgreSQL
          pt-br: Serviço PostgreSQL
        required: true
        type: service
    - default: 5432
      edit: true
      envKey: PANEL_DB_PORT
      labelEn: Database Port
      labelZh: 数据库端口
      label:
        en: Database Port
        zh: 数据库端口
        zh-Hant: 資料庫連接埠
        ja: データベースポート
        ko: 데이터베이스 포트
        ru: Порт базы данных
        ms: Port Pangkalan Data
        pt-br: Porta do banco de dados
      required: true
      rule: paramPort
      type: number
    - default: litellm
      edit: true
      envKey: PANEL_DB_NAME
      labelEn: Database Name
      labelZh: 数据库名
      label:
        en: Database Name
        zh: 数据库名
        zh-Hant: 資料庫名稱
        ja: データベース名
        ko: 데이터베이스 이름
        ru: Имя базы данных
        ms: Nama Pangkalan Data
        pt-br: Nome do banco de dados
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: litellm
      edit: true
      envKey: PANEL_DB_USER
      labelEn: Database User
      labelZh: 数据库用户
      label:
        en: Database User
        zh: 数据库用户
        zh-Hant: 資料庫使用者
        ja: データベースユーザー
        ko: 데이터베이스 사용자
        ru: Пользователь базы данных
        ms: Pengguna Pangkalan Data
        pt-br: Usuário do banco de dados
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: ""
      edit: true
      envKey: PANEL_DB_USER_PASSWORD
      labelEn: Database Password
      labelZh: 数据库密码
      label:
        en: Database Password
        zh: 数据库密码
        zh-Hant: 資料庫密碼
        ja: データベースパスワード
        ko: 데이터베이스 비밀번호
        ru: Пароль базы данных
        ms: Kata Laluan Pangkalan Data
        pt-br: Senha do banco de dados
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: ""
      edit: true
      envKey: LITELLM_MASTER_KEY
      labelEn: Master Key
      labelZh: 管理密钥
      label:
        en: Master Key
        zh: 管理密钥
        zh-Hant: 管理金鑰
        ja: 管理キー
        ko: 관리 키
        ru: Главный ключ
        ms: Kunci Induk
        pt-br: Chave mestra
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: ""
      edit: true
      envKey: LITELLM_SALT_KEY
      labelEn: Credential Encryption Key
      labelZh: 凭据加密密钥
      label:
        en: Credential Encryption Key
        zh: 凭据加密密钥
        zh-Hant: 憑證加密金鑰
        ja: 認証情報暗号化キー
        ko: 자격 증명 암호화 키
        ru: Ключ шифрования учетных данных
        ms: Kunci Penyulitan Kelayakan
        pt-br: Chave de criptografia de credenciais
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: ./data
      edit: true
      envKey: APP_DATA_DIR
      labelEn: Secret Backup Directory
      labelZh: 密钥备份目录
      label:
        en: Secret Backup Directory
        zh: 密钥备份目录
        zh-Hant: 金鑰備份目錄
        ja: キーバックアップディレクトリ
        ko: 키 백업 디렉터리
        ru: Каталог резервных копий ключей
        ms: Direktori Sandaran Kunci
        pt-br: Diretório de backup das chaves
      required: true
      type: text
