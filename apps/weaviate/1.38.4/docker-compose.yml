services:
  weaviate:
    image: "semitechnologies/weaviate:1.38.4"
    container_name: ${CONTAINER_NAME}
    restart: unless-stopped
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8080"
      - "${PANEL_APP_PORT_GRPC}:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: "${QUERY_DEFAULTS_LIMIT}"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: "${WEAVIATE_API_KEY}"
      AUTHENTICATION_APIKEY_USERS: "${WEAVIATE_API_USER}"
      AUTHORIZATION_RBAC_ENABLED: "true"
      AUTHORIZATION_RBAC_ROOT_USERS: "${WEAVIATE_API_USER}"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      API_BASED_MODULES_DISABLED: "true"
      CLUSTER_HOSTNAME: "${CONTAINER_NAME}"
      RAFT_JOIN: "${CONTAINER_NAME}"
      RAFT_BOOTSTRAP_EXPECT: "1"
      DISABLE_TELEMETRY: "true"
    volumes:
      - "${APP_DATA_DIR}:/var/lib/weaviate"
    healthcheck:
      test: ["CMD", "/usr/bin/wget", "-q", "--spider", "http://127.0.0.1:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 3s
      start_period: 20s
      retries: 10
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
