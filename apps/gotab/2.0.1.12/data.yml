additionalProperties:
  formFields:
  - default: '43009'
    edit: true
    envKey: PANEL_APP_PORT_HTTP
    label:
      en: Web Port
      zh: Web 端口
      zh-Hant: Web 連接埠
      ja: Webポート
      ko: 웹 포트
      ru: Веб-порт
      ms: Port Web
      pt-br: Porta Web
    required: true
    rule: paramPort
    type: number
  - default: mysql
    envKey: PANEL_DB_TYPE
    label:
      en: Database Service
      zh: 数据库服务
      zh-Hant: 資料庫服務
      ja: データベースサービス
      ko: 데이터베이스 서비스
      ru: Сервис базы данных
      ms: Perkhidmatan Pangkalan Data
      pt-br: Serviço de Banco de Dados
    required: true
    type: apps
    values:
      - label: MySQL
        value: mysql
    child:
      default: ''
      envKey: PANEL_DB_HOST
      label:
        en: Database Service
        zh: 数据库服务
        zh-Hant: 資料庫服務
        ja: データベースサービス
        ko: 데이터베이스 서비스
        ru: Сервис базы данных
        ms: Perkhidmatan Pangkalan Data
        pt-br: Serviço de Banco de Dados
      required: true
      type: service
  - default: 3306
    edit: true
    envKey: PANEL_DB_PORT
    label:
      en: Database Port
      zh: 数据库端口
      zh-Hant: 資料庫連接埠
      ja: データベースポート
      ko: 데이터베이스 포트
      ru: Порт базы данных
      ms: Port Pangkalan Data
      pt-br: Porta de Banco de Dados
    required: true
    rule: paramPort
    type: number
  - default: gotab
    edit: true
    envKey: PANEL_DB_NAME
    label:
      en: Database Name
      zh: 数据库名
      zh-Hant: 資料庫名稱
      ja: データベース名
      ko: 데이터베이스 이름
      ru: Имя базы данных
      ms: Nama Pangkalan Data
      pt-br: Nome do Banco de Dados
    random: true
    required: true
    rule: paramCommon
    type: text
  - default: gotab
    edit: true
    envKey: PANEL_DB_USER
    label:
      en: Database User
      zh: 数据库用户
      zh-Hant: 資料庫使用者
      ja: データベースユーザー
      ko: 데이터베이스 사용자
      ru: Пользователь базы данных
      ms: Pengguna Pangkalan Data
      pt-br: Usuário do Banco de Dados
    random: true
    required: true
    rule: paramCommon
    type: text
  - default: ''
    edit: true
    envKey: PANEL_DB_USER_PASSWORD
    label:
      en: Database Password
      zh: 数据库密码
      zh-Hant: 資料庫密碼
      ja: データベースパスワード
      ko: 데이터베이스 비밀번호
      ru: Пароль базы данных
      ms: Kata Laluan Pangkalan Data
      pt-br: Senha do Banco de Dados
    random: true
    required: true
    rule: paramComplexity
    type: password
  - default: Asia/Shanghai
    edit: true
    envKey: TIME_ZONE
    label:
      en: Time Zone
      zh: 时区
      zh-Hant: 時區
      ja: タイムゾーン
      ko: 시간대
      ru: Часовой пояс
      ms: Zon waktu
      pt-br: Fuso horário
    required: true
    type: text
