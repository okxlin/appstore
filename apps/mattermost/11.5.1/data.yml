      envKey: GITLAB_PKI_CHAIN_PATH
      labelEn: GitLab PKI Chain Path (Edit to remove comments in compose.yml to take effect)
      labelZh: GitLab PKI 链路径 (编辑去除compose.yml里的注释生效)
      label:
        en: 'GitLab PKI Chain Path (Edit to remove comments in compose.yml to take effect)'
        zh: 'GitLab PKI 链路径 (编辑去除compose.yml里的注释生效)'
        zh-Hant: 'GitLab PKI 鏈路徑（編輯移除 compose.yml 註解後生效）'
        ja: 'GitLab PKI チェーンパス（有効にするには compose.yml のコメントを外してください）'
        ko: 'GitLab PKI 체인 경로(적용하려면 compose.yml의 주석을 제거하세요)'
        ru: 'Путь к цепочке PKI GitLab (удалите комментарии в compose.yml, чтобы применить)'
        ms: 'Laluan rantaian PKI GitLab (buang komen dalam compose.yml untuk berkuat kuasa)'
        pt-br: 'Caminho da cadeia PKI do GitLab (remova os comentários em compose.yml para ativar)'
      required: false
      type: text
    - default: "./data/bleve/indexes"
      edit: true
      envKey: MATTERMOST_BLEVE_INDEXES_PATH
      labelEn: Bleve Indexes Path
      labelZh: Bleve 索引路径
      label:
