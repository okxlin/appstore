      type: text
    - default: "./data/data"
      disabled: true
      envKey: MATTERMOST_DATA_PATH
      labelEn: Data Path
      labelZh: 数据路径
      label:
        en: 'Data Path'
        zh: '数据路径'
        zh-Hant: '資料路徑'
        ja: 'データパス'
        ko: '데이터 경로'
        ru: 'Путь к данным'
