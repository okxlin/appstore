additionalProperties:
  formFields:
    - default: 40271
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Port
      labelZh: 端口
      label:
        en: 'Port'
        zh: '端口'
        zh-Hant: '埠'
        ja: 'ポート'
        ko: '포트'
        ru: 'Порт'
        ms: 'Port'
        pt-br: 'Porta'
      required: true
      rule: paramPort
      type: number
    - default: 40272
      edit: true
      envKey: PANEL_APP_PORT_CALLS
      labelEn: RTC Port
      labelZh: RTC 服务端口
      label:
        en: 'RTC Port'
        zh: 'RTC 服务端口'
        zh-Hant: 'RTC 服務埠'
        ja: 'RTC ポート'
        ko: 'RTC 포트'
        ru: 'Порт RTC'
        ms: 'Port RTC'
        pt-br: 'Porta RTC'
      required: true
      rule: paramPort
      type: number
    - default: "false"
      edit: true
      envKey: MATTERMOST_CONTAINER_READONLY
      labelEn: Read Only Container
      labelZh: 只读容器
      label:
        en: 'Read Only Container'
        zh: '只读容器'
        zh-Hant: '唯讀容器'
        ja: '読み取り専用コンテナ'
        ko: '읽기 전용 컨테이너'
        ru: 'Контейнер только для чтения'
        ms: 'Kontena hanya baca'
        pt-br: 'Contêiner somente leitura'
      required: false
      type: select
      values:
        - label:
            en: 'True'
            zh: '是'
            zh-Hant: '是'
            ja: 'はい'
            ko: '예'
            ru: 'Да'
            ms: 'Ya'
            pt-br: 'Sim'
          value: "true"
        - label:
            en: 'False'
            zh: '否'
            zh-Hant: '否'
            ja: 'いいえ'
            ko: '아니요'
            ru: 'Нет'
            ms: 'Tidak'
            pt-br: 'Não'
          value: "false"
    - default: "./data/config"
      disabled: true
      envKey: MATTERMOST_CONFIG_PATH
      labelEn: Config Path
      labelZh: 配置路径
      label:
        en: 'Config Path'
        zh: '配置路径'
        zh-Hant: '設定路徑'
        ja: '設定パス'
        ko: '구성 경로'
        ru: 'Путь конфигурации'
        ms: 'Laluan konfigurasi'
        pt-br: 'Caminho de configuração'
