        zh: 'Bleve 索引路径'
        zh-Hant: 'Bleve 索引路徑'
        ja: 'Bleve インデックスパス'
        ko: 'Bleve 인덱스 경로'
        ru: 'Путь к индексам Bleve'
        ms: 'Laluan indeks Bleve'
        pt-br: 'Caminho dos índices Bleve'
      required: true
      type: text
    - default: "Asia/Shanghai"
      edit: true
      envKey: TZ
      labelEn: Time Zone
      labelZh: 时区
      label:
        en: 'Time Zone'
        zh: '时区'
        zh-Hant: '時區'
        ja: 'タイムゾーン'
        ko: '시간대'
        ru: 'Часовой пояс'
        ms: 'Zon waktu'
        pt-br: 'Fuso horário'
      required: true
      type: text
    - default: "postgres"
      disabled: true
      envKey: MM_SQLSETTINGS_DRIVERNAME
      labelEn: SQL Driver Name
      labelZh: SQL 驱动名称
      label:
        en: 'SQL Driver Name'
        zh: 'SQL 驱动名称'
        zh-Hant: 'SQL 驅動程式名稱'
        ja: 'SQL ドライバー名'
        ko: 'SQL 드라이버 이름'
        ru: 'Имя драйвера SQL'
        ms: 'Nama pemacu SQL'
        pt-br: 'Nome do driver SQL'
      required: true
      type: text
    - default: "/mattermost/bleve-indexes"
      disabled: true
      envKey: MM_BLEVESETTINGS_INDEXDIR
      labelEn: Bleve Index Directory
      labelZh: Bleve 索引目录
      label:
        en: 'Bleve Index Directory'
        zh: 'Bleve 索引目录'
        zh-Hant: 'Bleve 索引目錄'
        ja: 'Bleve インデックスディレクトリ'
        ko: 'Bleve 인덱스 디렉터리'
        ru: 'Каталог индексов Bleve'
        ms: 'Direktori indeks Bleve'
        pt-br: 'Diretório de índices Bleve'
      required: true
      type: text
    - default: "http://localhost:40271"
      edit: true
      envKey: MM_SERVICESETTINGS_SITEURL
      labelEn: Site URL
      labelZh: 站点 URL
      label:
        en: 'Site URL'
        zh: '站点 URL'
        zh-Hant: '網站 URL'
        ja: 'サイトURL'
        ko: '사이트 URL'
        ru: 'URL сайта'
        ms: 'URL tapak'
        pt-br: 'URL do site'
      required: true
      rule: paramExtUrl
      type: text
    - default: postgresql
      envKey: PANEL_DB_TYPE
      labelEn: Database Service
      labelZh: 数据库服务
      label:
        en: 'Database Service'
        zh: '数据库服务'
        zh-Hant: '資料庫服務'
        ja: 'データベースサービス'
        ko: '데이터베이스 서비스'
        ru: 'Служба базы данных'
        ms: 'Perkhidmatan pangkalan data'
        pt-br: 'Serviço de banco de dados'
      required: true
      type: apps
      child:
        default: ""
        envKey: PANEL_DB_HOST
        required: true
        type: service
      values:
        - label: PostgreSQL
          value: postgresql
    - default: mattermost
      envKey: PANEL_DB_NAME
      labelEn: Database
      labelZh: 数据库名
      label:
        en: 'Database'
        zh: '数据库名'
        zh-Hant: '資料庫'
        ja: 'データベース'
        ko: '데이터베이스'
        ru: 'База данных'
        ms: 'Pangkalan data'
        pt-br: 'Banco de dados'
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: mattermost
      envKey: PANEL_DB_USER
      labelEn: User
      labelZh: 数据库用户
      label:
        en: 'User'
        zh: '数据库用户'
        zh-Hant: '資料庫使用者'
        ja: 'データベースユーザー'
        ko: '데이터베이스 사용자'
        ru: 'Пользователь базы данных'
        ms: 'Pengguna pangkalan data'
        pt-br: 'Usuário do banco de dados'
      random: true
      required: true
      rule: paramCommon
      type: text
    - default: mattermost
      envKey: PANEL_DB_USER_PASSWORD
      labelEn: Password
      labelZh: 数据库用户密码
      label:
        en: 'Password'
        zh: '数据库用户密码'
        zh-Hant: '資料庫使用者密碼'
        ja: 'データベースユーザーのパスワード'
        ko: '데이터베이스 사용자 비밀번호'
        ru: 'Пароль пользователя базы данных'
        ms: 'Kata laluan pengguna pangkalan data'
        pt-br: 'Senha do usuário do banco de dados'
      random: true
      required: true
      rule: paramComplexity
      type: password
