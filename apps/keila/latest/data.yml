        zh: 数据库名
        zh-Hant: 資料庫名稱
        ja: データベース名
        ko: 데이터베이스 이름
        ru: Имя базы данных
        ms: Nama Pangkalan Data
        pt-br: Nome do banco de dados
      random: true
      required: true
      rule: paramCommon
      type: text
