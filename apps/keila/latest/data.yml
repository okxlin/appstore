additionalProperties:
  formFields:
    - default: 4000
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: HTTP Port
      labelZh: HTTP 端口
      label:
        en: HTTP Port
        zh: HTTP 端口
        zh-Hant: HTTP 連接埠
        ja: HTTP ポート
        ko: HTTP 포트
        ru: HTTP-порт
        ms: Port HTTP
        pt-br: Porta HTTP
      required: true
      rule: paramPort
      type: number
    - default: postgresql
      envKey: PANEL_DB_TYPE
      labelEn: Database Runtime
      labelZh: 数据库 Runtime
      label:
        en: Database Runtime
        zh: 数据库 Runtime
        zh-Hant: 資料庫 Runtime
        ja: データベース Runtime
        ko: 데이터베이스 Runtime
        ru: Среда базы данных
        ms: Runtime Pangkalan Data
        pt-br: Runtime de banco de dados
      required: true
      type: apps
      values:
        - label: PostgreSQL
          value: postgresql
      child:
        default: ''
        envKey: PANEL_DB_HOST
        labelEn: PostgreSQL Service
        labelZh: PostgreSQL 服务
        label:
          en: PostgreSQL Service
          zh: PostgreSQL 服务
          zh-Hant: PostgreSQL 服務
          ja: PostgreSQL サービス
          ko: PostgreSQL 서비스
          ru: Сервис PostgreSQL
          ms: Perkhidmatan PostgreSQL
          pt-br: Serviço PostgreSQL
        required: true
        type: service
    - default: 5432
      edit: true
      envKey: PANEL_DB_PORT
      labelEn: Database Port
      labelZh: 数据库端口
      label:
        en: Database Port
        zh: 数据库端口
        zh-Hant: 資料庫連接埠
        ja: データベースポート
        ko: 데이터베이스 포트
        ru: Порт базы данных
        ms: Port Pangkalan Data
        pt-br: Porta do banco de dados
      required: true
      rule: paramPort
      type: number
    - default: keila
      edit: true
      envKey: PANEL_DB_NAME
      labelEn: Database Name
      labelZh: 数据库名
      label:
