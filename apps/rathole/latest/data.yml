        ru: Config Path
        ms: Config Path
        pt-br: Config Path
      required: true
      type: select
      values:
        - label: Client Config
          value: ./data/client.toml
        - label: Server Config
          value: ./data/server.toml
    - default: "server"
      edit: true
      envKey: SERVICE_MODE
      labelEn: Service Mode
      labelZh: 服务模式
      label:
        en: Service Mode
        zh: 服务模式
        zh-Hant: 服务模式
        ja: Service Mode
        ko: Service Mode
        ru: Service Mode
        ms: Service Mode
        pt-br: Service Mode
      required: true
      type: select
      values:
        - label: Server
          value: server
        - label: Client
          value: client
