additionalProperties:
  formFields:
    - default: 7333
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      rule: paramPort
      labelEn: Port (determined by the configuration file)
      labelZh: 端口 (由配置文件决定)
      label:
        en: Port (determined by the configuration file)
        zh: 端口 (由配置文件决定)
        zh-Hant: 端口 (由配置文件决定)
        ja: Port (determined by the configuration file)
        ko: Port (determined by the configuration file)
        ru: Port (determined by the configuration file)
        ms: Port (determined by the configuration file)
        pt-br: Port (determined by the configuration file)
      required: true
      type: number
    - default: "./data/server.toml"
      edit: true
      envKey: CONFIG_PATH
      labelEn: Config Path
      labelZh: 配置路径
      label:
        en: Config Path
        zh: 配置路径
        zh-Hant: 配置路径
        ja: Config Path
