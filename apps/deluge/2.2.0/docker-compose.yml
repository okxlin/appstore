networks:
  1panel-network:
    external: true
services:
  deluge:
    image: "linuxserver/deluge:18.04.1"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8112"
      - "${PANEL_APP_PORT_PEER_TCP}:6881"
      - "${PANEL_APP_PORT_PEER_UDP}:6881/udp"
      - "${PANEL_APP_PORT_DAEMON}:58846"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${DOWNLOADS_PATH}:/downloads"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
    labels:
      createdBy: "Apps"
