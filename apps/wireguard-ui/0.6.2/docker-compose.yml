services:
  wireguard-ui:
    container_name: ${CONTAINER_NAME}
    restart: always
    depends_on:
      - wireguard
    cap_add:
      - NET_ADMIN
    network_mode: service:wireguard
    environment:
      - SESSION_SECRET=${SESSION_SECRET}
      - BASE_PATH=${BASE_PATH}
      - WGUI_USERNAME=${WEBUI_USER}
      - WGUI_PASSWORD=${WEBUI_PWD}
      - WGUI_MANAGE_START=${WGUI_MANAGE_START}
      - WGUI_MANAGE_RESTART=${WGUI_MANAGE_RESTART}
      - WGUI_SERVER_LISTEN_PORT=${PANEL_APP_PORT_WIREGUARD}
      - WGUI_LOG_LEVEL=${WGUI_LOG_LEVEL}
      - BIND_ADDRESS=0.0.0.0:${PANEL_APP_PORT_HTTP}
    volumes:
      - ${DATA_PATH}/db:/app/db
      - ${DATA_PATH}/config:/etc/wireguard
    image: "ngoduykhanh/wireguard-ui:0.6.2"
    logging:
      driver: json-file
      options:
        max-size: 50m
    labels:  
      createdBy: "Apps"

  wireguard:
    container_name: ${CONTAINER_NAME}-wireguard
    restart: always
    networks:
      - 1panel-network
    cap_add:
      - NET_ADMIN
    volumes:
      - ${DATA_PATH}/config:/config
    ports:
      - "${PANEL_APP_PORT_HTTP}:${PANEL_APP_PORT_HTTP}"
      - "${PANEL_APP_PORT_WIREGUARD}:${PANEL_APP_PORT_WIREGUARD}/udp"
    environment:
      - PUID=1000
      - PGID=1000
      - PEERS=1
      - SERVERPORT=${PANEL_APP_PORT_WIREGUARD}
    image: "linuxserver/wireguard:latest"
    labels:  
      createdBy: "Apps"

networks:  
  1panel-network:  
    external: true
