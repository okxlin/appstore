        zh: 数据库服务
        zh-hant: 資料庫服務
        ja: データベース
        ko: 데이터베이스
        ru: База данных
        ms: Pangkalan Data
        pt-br: Banco de dados
      required: true
      type: apps
      values:
        - label: PostgreSQL
          value: postgresql
    - default: sub2api
      edit: true
      envKey: PANEL_DB_NAME
      labelEn: Database Name
      labelZh: 数据库名
      label:
        en: Database Name
        zh: 数据库名
        zh-hant: 資料庫名稱
        ja: データベース名
        ko: 데이터베이스 이름
        ru: Имя базы данных
        ms: Nama pangkalan data
        pt-br: Nome do banco de dados
