additionalProperties:
  formFields:
    - child:
        default: ""
        envKey: PANEL_DB_HOST
        labelEn: Database Service
        labelZh: 数据库服务
        label:
          en: Database Service
          zh: 数据库服务
          zh-hant: 資料庫服務
          ja: データベースサービス
          ko: 데이터베이스 서비스
          ru: Служба базы данных
