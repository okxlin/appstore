networks:
  1panel-network:
    external: true
services:
  tvheadend:
    image: "linuxserver/tvheadend:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:9981"
      - "${PANEL_APP_PORT_HTSP}:9982"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${RECORDINGS_PATH}:/recordings"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
    labels:
      createdBy: "Apps"
