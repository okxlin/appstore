services:
  fast-note-sync-service:
    image: "haierkeys/fast-note-sync-service:3.5.7"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:9000"
    environment:
      - "TZ=${TZ}"
    labels:
      createdBy: "Apps"
    volumes:
      - "${APP_DATA_DIR}:/fast-note-sync/storage"
      - "${APP_CONFIG_DIR}:/fast-note-sync/config"

networks:
  1panel-network:
    external: true
