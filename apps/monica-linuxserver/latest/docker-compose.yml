networks:
  1panel-network:
    external: true
services:
  monica:
    image: "linuxserver/monica:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:80"
      - "${PANEL_APP_PORT_HTTPS}:443"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - DB_HOST=monica-db
      - DB_PORT=3306
      - DB_USERNAME=monica
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=monica
      - APP_URL=${APP_URL}
      - TRUSTED_PROXIES=${TRUSTED_PROXIES:-}
      - APP_ENV=${APP_ENV:-local}
      - APP_DISABLE_SIGNUP=${APP_DISABLE_SIGNUP:-false}
    depends_on:
      - monica-db
    labels:
      createdBy: "Apps"
  monica-db:
    image: "mariadb:11.4"
    restart: always
    networks:
      - 1panel-network
    volumes:
      - "${DB_DATA_PATH}:/var/lib/mysql"
    environment:
      - MARIADB_ROOT_PASSWORD=${DB_PASSWORD}
      - MARIADB_DATABASE=monica
      - MARIADB_USER=monica
      - MARIADB_PASSWORD=${DB_PASSWORD}
    labels:
      createdBy: "Apps"
