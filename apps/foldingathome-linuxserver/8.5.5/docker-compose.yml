networks:
  1panel-network:
    external: true
services:
  foldingathome:
    image: "linuxserver/foldingathome:8.5.5"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:7396"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - ACCOUNT_TOKEN=${ACCOUNT_TOKEN:-}
      - MACHINE_NAME=${MACHINE_NAME}
      - CLI_ARGS=${CLI_ARGS:-}
    labels:
      createdBy: "Apps"
