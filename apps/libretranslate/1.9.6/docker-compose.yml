services:
  libretranslate:
    image: "libretranslate/libretranslate:v1.9.6"
    container_name: ${CONTAINER_NAME}
    ports:
      - "${PANEL_APP_PORT_HTTP}:5000"
    environment:
      - LT_API_KEYS=${LT_API_KEYS}
      - LT_API_KEYS_DB_PATH=/app/db/api_keys.db
      - LT_UPDATE_MODELS=${LT_UPDATE_MODELS}
    volumes:
      - libretranslate-db:/app/db
      - libretranslate-models:/home/libretranslate/.local
    healthcheck:
      test:
        - CMD-SHELL
        - ./venv/bin/python scripts/healthcheck.py
      interval: 10s
      timeout: 4s
      retries: 4
      start_period: 5s
    labels:
      createdBy: Apps
    networks:
      - 1panel-network
    restart: unless-stopped

volumes:
  libretranslate-db:
  libretranslate-models:

networks:
  1panel-network:
    external: true
