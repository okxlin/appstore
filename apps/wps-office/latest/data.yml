        zh-Hant: '時區'
        ja: 'タイムゾーン'
        ko: '시간대'
        ru: 'Часовой пояс'
        ms: 'Zon masa'
        pt-br: 'Fuso horário'
      required: true
      type: text
    - default: user
      edit: true
      envKey: HTTP_USER
      labelEn: http auth user
      labelZh: HTTP 用户
      label:
        en: 'http auth user'
        zh: 'HTTP 用户'
        zh-Hant: 'HTTP 認證使用者'
        ja: 'HTTP 認証ユーザー'
        ko: 'HTTP 인증 사용자'
