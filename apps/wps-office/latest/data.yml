      edit: true
      envKey: HTTP_PWD
      labelEn: http auth password
      labelZh: HTTP 密码
      label:
        en: 'http auth password'
        zh: 'HTTP 密码'
        zh-Hant: 'HTTP 認證密碼'
        ja: 'HTTP 認証パスワード'
        ko: 'HTTP 인증 비밀번호'
