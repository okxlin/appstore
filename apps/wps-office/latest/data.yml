      labelZh: 共享内存占用(512m)
      label:
        en: 'Shared memory footprint (512m)'
        zh: '共享内存占用(512m)'
        zh-Hant: '共享記憶體佔用(512m)'
        ja: '共有メモリ使用量(512m)'
        ko: '공유 메모리 사용량(512m)'
