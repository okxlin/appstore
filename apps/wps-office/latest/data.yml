        ms: 'Penggunaan memori dikongsi (512m)'
        pt-br: 'Uso de memória compartilhada (512m)'
      required: true
      type: text

    - default: zh_CN.UTF-8
      edit: true
      envKey: LC_ALL
      labelEn: Desktop language locale
      labelZh: 桌面语言区域
      label:
