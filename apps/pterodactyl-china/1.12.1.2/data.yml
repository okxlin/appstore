additionalProperties:
  formFields:
    - default: 1000
      envKey: USER_UID
      labelEn: User UID
      labelZh: 用户 UID
      label:
        en: 'User UID'
        zh: '用户 UID'
        zh-Hant: '用戶 UID'
        ja: 'ユーザー UID'
        ko: '사용자 UID'
        ru: 'UID пользователя'
        ms: 'UID pengguna'
        pt-br: 'UID do usuário'
      required: true
      type: text
    - default: 1000
      envKey: USER_GID
      labelEn: User GID
      labelZh: 用户 GID
      label:
        en: 'User GID'
        zh: '用户 GID'
        zh-Hant: '用戶 GID'
        ja: 'ユーザー GID'
        ko: '사용자 GID'
        ru: 'GID пользователя'
        ms: 'GID pengguna'
        pt-br: 'GID do usuário'
      required: true
      type: text
    - default: mysql
      envKey: PANEL_DB_TYPE
      labelEn: Database Service
      labelZh: 数据库服务
      label:
        en: 'Database Service'
        zh: '数据库服务'
        zh-Hant: '數據庫服務'
        ja: 'データベースサービス'
        ko: '데이터베이스 서비스'
        ru: 'Сервис базы данных'
        ms: 'Perkhidmatan Pangkalan Data'
        pt-br: 'Serviço de Banco de Dados'
