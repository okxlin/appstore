        zh: '数据库用户密码'
        zh-Hant: '數據庫用戶密碼'
        ja: 'パスワード'
        ko: '비밀번호'
        ru: 'Пароль'
        ms: 'Kata laluan'
        pt-br: 'Senha'
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: 40222
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Port
      labelZh: HTTP 端口
      label:
        en: 'Port'
        zh: '端口'
        zh-Hant: '埠'
