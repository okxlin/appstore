      type: apps
      child:
        default: ""
        envKey: PANEL_DB_HOST
        required: true
        type: service
      values:
        - label:
            en: 'MySQL'
            zh: 'MySQL'
            zh-Hant: 'MySQL'
            ja: 'MySQL'
            ko: 'MySQL'
            ru: 'MySQL'
            ms: 'MySQL'
            pt-br: 'MySQL'
          value: mysql
