services:
  qexo:
    image: "abudulin/qexo:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:8000"
    environment:
      - TZ=${TZ}
      - DOMAINS=${DOMAINS}
      - WORKERS=${WORKERS}
      - THREADS=${THREADS}
      - TIMEOUT=${TIMEOUT}
    volumes:
      - "${APP_DATA_DIR}:/app/db"
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
