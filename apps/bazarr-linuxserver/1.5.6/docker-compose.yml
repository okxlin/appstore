networks:
  1panel-network:
    external: true
services:
  bazarr:
    image: "linuxserver/bazarr:1.5.6"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:6767"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${MOVIES_PATH}:/movies"
      - "${TV_PATH}:/tv"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
    labels:
      createdBy: "Apps"
