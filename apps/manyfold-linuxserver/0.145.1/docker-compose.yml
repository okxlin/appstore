services:
  manyfold:
    image: "linuxserver/manyfold:0.145.1"
    container_name: ${CONTAINER_NAME}
    restart: always
    depends_on:
      - manyfold-redis
    networks:
      - 1panel-network
      - manyfold-internal
    ports:
      - "${PANEL_APP_PORT_HTTP}:3214"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${LIBRARIES_PATH}:/libraries"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SECRET_KEY_BASE=${SECRET_KEY_BASE}
    labels:
      createdBy: "Apps"
  manyfold-redis:
    image: "redis:7-alpine"
    container_name: ${CONTAINER_NAME}-redis
    restart: always
    networks:
      - manyfold-internal
    command: redis-server --appendonly yes
    volumes:
      - "${REDIS_DATA_PATH}:/data"
    labels:
      createdBy: "Apps"
networks:
  1panel-network:
    external: true
  manyfold-internal:
    driver: bridge
