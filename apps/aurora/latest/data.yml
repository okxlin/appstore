      required: true
      rule: paramCommon
      type: text
    - default: aurora
      envKey: PANEL_DB_USER_PASSWORD
      labelEn: Password
      labelZh: 数据库用户密码
      label:
        en: 'Password'
        zh: '数据库用户密码'
        zh-Hant: '數據庫用戶密碼'
        ja: 'パスワード'
        ko: '비밀번호'
        ru: 'Пароль'
        ms: 'Kata laluan'
        pt-br: 'Senha'
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: 40036
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: Port
      labelZh: 端口
      label:
        en: 'Port'
        zh: '端口'
        zh-Hant: '埠'
        ja: 'ポート'
        ko: '포트'
        ru: 'Порт'
        ms: 'Port'
        pt-br: 'Porta'
      required: true
      rule: paramPort
      type: number
    - default: ./data
      edit: true
      envKey: DATA_PATH
      labelEn: Data storage folder
      labelZh: 数据存放文件夹
      label:
        en: 'Data storage folder'
        zh: '数据存放文件夹'
        zh-Hant: '資料存放資料夾'
        ja: 'データ保存フォルダー'
        ko: '데이터 저장 폴더'
