        pt-br: 'Pasta de armazenamento de dados'
      required: true
      type: text
    - default: /root/.ssh/id_rsa
      edit: true
      envKey: SSH_KEY_PATH
      labelEn: SSH key file
      labelZh: SSH 私钥文件
      label:
        en: 'SSH key file'
        zh: 'SSH 私钥文件'
        zh-Hant: 'SSH 私鑰檔案'
        ja: 'SSH 鍵ファイル'
