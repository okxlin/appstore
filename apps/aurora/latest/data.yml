additionalProperties:
  formFields:
    - default: aurora
      envKey: PANEL_DB_NAME
      labelEn: Database
      labelZh: 数据库名
      label:
        en: 'Database'
        zh: '数据库名'
        zh-Hant: '數據庫名'
        ja: 'データベース'
        ko: '데이터베이스'
