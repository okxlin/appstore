        ru: 'Файл ключа SSH'
        ms: 'Fail kunci SSH'
        pt-br: 'Arquivo de chave SSH'
      required: true
      type: text
    - default: aurora
      envKey: SECRECY_KEY
      labelEn: Secret Key
      labelZh: 保密密码
      label:
        en: 'Secret Key'
        zh: '保密密码'
        zh-Hant: '保密密碼'
        ja: 'シークレットキー'
        ko: '비밀 키'
        ru: 'Секретный ключ'
        ms: 'Kunci rahsia'
        pt-br: 'Chave secreta'
      random: true
      required: true
      rule: paramComplexity
      type: password
