    - default: aurora
      envKey: PANEL_DB_USER
      labelEn: User
      labelZh: 数据库用户
      label:
        en: 'User'
        zh: '数据库用户'
        zh-Hant: '數據庫用戶'
        ja: 'ユーザー'
        ko: '사용자'
        ru: 'Пользователь'
        ms: 'Pengguna'
        pt-br: 'Usuário'
