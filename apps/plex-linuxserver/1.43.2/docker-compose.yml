networks:
  1panel-network:
    external: true
services:
  plex:
    image: "linuxserver/plex:1.43.2"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:32400"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${TV_PATH}:/tv"
      - "${MOVIES_PATH}:/movies"
      - "${TRANSCODE_PATH}:/transcode"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM:-}
    labels:
      createdBy: "Apps"
