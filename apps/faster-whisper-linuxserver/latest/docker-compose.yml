networks:
  1panel-network:
    external: true
services:
  faster-whisper:
    image: "linuxserver/faster-whisper:latest"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_WYOMING}:10300"
    volumes:
      - "${CONFIG_PATH}:/config"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - DEBUG=${DEBUG:-}
      - LOCAL_ONLY=${LOCAL_ONLY:-}
      - WHISPER_BEAM=${WHISPER_BEAM:-}
      - WHISPER_LANG=${WHISPER_LANG:-}
      - WHISPER_MODEL=${WHISPER_MODEL:-}
    labels:
      createdBy: "Apps"
