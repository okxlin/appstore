      labelEn: Time zone
      labelZh: 时区
      label:
        en: Time zone
        zh: 时区
        zh-Hant: 时区
        ja: Time zone
        ko: Time zone
        ru: Time zone
        ms: Time zone
        pt-br: Time zone
