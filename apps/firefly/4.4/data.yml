      edit: true
      envKey: FIREFLY_AUTO_SSL
      labelEn: Should automatic SSL certificate acquisition be enabled? If enabled, the port needs to be set to 443.
      labelZh: 是否启用自动获取 SSL 证书 (开启则需要将端口设置为 443)
      label:
        en: Should automatic SSL certificate acquisition be enabled? If enabled, the port needs to be set to 443.
        zh: 是否启用自动获取 SSL 证书 (开启则需要将端口设置为 443)
        zh-Hant: 是否启用自动获取 SSL 证书 (开启则需要将端口设置为 443)
        ja: Should automatic SSL certificate acquisition be enabled? If enabled, the port needs to be set to 443.
        ko: Should automatic SSL certificate acquisition be enabled? If enabled, the port needs to be set to 443.
        ru: Should automatic SSL certificate acquisition be enabled? If enabled, the port needs to be set to 443.
        ms: Should automatic SSL certificate acquisition be enabled? If enabled, the port needs to be set to 443.
        pt-br: Should automatic SSL certificate acquisition be enabled? If enabled, the port needs to be set to 443.
      required: true
      type: select
      values:
        - label: "True"
          value: "true"
        - label: "False"
          value: "false"
