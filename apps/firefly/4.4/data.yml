        ko: Port
        ru: Port
        ms: Port
        pt-br: Port
      required: true
      rule: paramPort
      type: number
    - default: "password"
      edit: true
      envKey: FIREFLY_PASSWORD
      labelEn: Webui password
      labelZh: 网页密码
