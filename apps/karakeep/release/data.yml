additionalProperties:
  formFields:
    - default: 13000
      edit: true
      envKey: PANEL_APP_PORT_HTTP
      labelEn: HTTP Port
      labelZh: HTTP 端口
      label:
        en: HTTP Port
        zh: HTTP 端口
        zh-Hant: HTTP 埠
        ja: HTTP ポート
        ko: HTTP 포트
        ru: HTTP-порт
        ms: Port HTTP
        pt-br: Porta HTTP
      required: true
      rule: paramPort
      type: number
    - default: Asia/Shanghai
      edit: true
      envKey: TZ
      labelEn: Timezone
      labelZh: 时区
      label:
        en: Timezone
        zh: 时区
        zh-Hant: 時區
        ja: タイムゾーン
        ko: 시간대
        ru: Часовой пояс
        ms: Zon waktu
        pt-br: Fuso horario
      required: true
      type: text
    - default: ./data
      edit: true
      envKey: APP_DATA_DIR
      labelEn: Data Directory
      labelZh: 数据目录
      label:
        en: Data Directory
        zh: 数据目录
        zh-Hant: 資料目錄
        ja: データディレクトリ
        ko: 데이터 디렉터리
        ru: Каталог данных
        ms: Direktori data
        pt-br: Diretorio de dados
      required: true
      type: text
    - default: http://1.2.3.4:13000
      edit: true
      envKey: NEXTAUTH_URL
      labelEn: Public URL
      labelZh: 公开访问地址
      label:
        en: Public URL
        zh: 公开访问地址
        zh-Hant: 公開存取位址
        ja: 公開アクセス URL
        ko: 공개 접속 주소
        ru: Публичный URL
        ms: URL awam
        pt-br: URL publico
      required: true
      rule: paramExtUrl
      type: text
    - default: karakeep_nextauth_secret
      edit: true
      envKey: NEXTAUTH_SECRET
      labelEn: NextAuth Secret
      labelZh: NextAuth 密钥
      label:
        en: NextAuth Secret
        zh: NextAuth 密钥
        zh-Hant: NextAuth 金鑰
        ja: NextAuth シークレット
        ko: NextAuth 비밀키
        ru: Секрет NextAuth
        ms: Rahsia NextAuth
        pt-br: Segredo do NextAuth
      random: true
      required: true
      rule: paramComplexity
      type: password
    - default: karakeep_meili_master_key
      edit: true
      envKey: MEILI_MASTER_KEY
      labelEn: Meilisearch Master Key
      labelZh: Meilisearch 主密钥
      label:
        en: Meilisearch Master Key
        zh: Meilisearch 主密钥
        zh-Hant: Meilisearch 主金鑰
        ja: Meilisearch マスターキー
        ko: Meilisearch 마스터 키
        ru: Главный ключ Meilisearch
        ms: Kunci induk Meilisearch
        pt-br: Chave mestra do Meilisearch
      random: true
      required: true
      type: password
    - default: "false"
      edit: true
      envKey: DISABLE_SIGNUPS
      labelEn: Disable New Signups
      labelZh: 禁止新用户注册
      label:
        en: Disable New Signups
        zh: 禁止新用户注册
        zh-Hant: 停用新使用者註冊
        ja: 新規登録を無効化
        ko: 신규 가입 비활성화
        ru: Отключить новые регистрации
        ms: Lumpuhkan pendaftaran baharu
        pt-br: Desativar novos cadastros
      required: true
      type: select
      values:
        - label: "false"
          value: "false"
        - label: "true"
          value: "true"
    - default: ""
      edit: true
      envKey: OPENAI_API_KEY
      labelEn: OpenAI API Key
      labelZh: OpenAI API 密钥
      label:
        en: OpenAI API Key
        zh: OpenAI API 密钥
        zh-Hant: OpenAI API 金鑰
        ja: OpenAI API キー
        ko: OpenAI API 키
        ru: Ключ OpenAI API
        ms: Kunci API OpenAI
        pt-br: Chave de API OpenAI
      required: false
      type: password
