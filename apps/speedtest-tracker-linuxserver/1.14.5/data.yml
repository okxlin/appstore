      en: Display time zone
      zh: 显示时区
      zh-Hant: 顯示時區
      ja: 表示タイムゾーン
      ko: 표시 시간대
      ru: Часовой пояс отображения
      ms: Zon waktu paparan
      pt-br: Fuso horario de exibicao
    required: false
    type: text
  - default: 0 */6 * * *
    edit: true
    envKey: SPEEDTEST_SCHEDULE
    labelEn: Speedtest schedule
    labelZh: 测速计划
