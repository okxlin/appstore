    envKey: APP_URL
    labelEn: Application URL
    labelZh: 应用访问 URL
    label:
      en: Application URL
      zh: 应用访问 URL
      zh-Hant: 應用程式存取 URL
      ja: アプリケーション URL
      ko: 애플리케이션 URL
      ru: URL приложения
      ms: URL aplikasi
      pt-br: URL da aplicacao
    required: false
    type: text
  - default: Asia/Shanghai
    edit: true
    envKey: TIME_ZONE
    labelEn: Time zone
    labelZh: 时区
    label:
      en: Time zone
      zh: 时区
      zh-Hant: 時區
      ja: タイムゾーン
      ko: 시간대
      ru: Часовой пояс
      ms: Zon waktu
      pt-br: Fuso horário
    required: true
    type: text
  - default: Asia/Shanghai
    edit: true
    envKey: DISPLAY_TIMEZONE
    labelEn: Display time zone
    labelZh: 显示时区
