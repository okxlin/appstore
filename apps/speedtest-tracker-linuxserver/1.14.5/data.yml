additionalProperties:
  formFields:
  - default: 80
    edit: true
    envKey: PANEL_APP_PORT_HTTP
    labelEn: HTTP Port
    labelZh: HTTP 端口
    label:
      en: HTTP Port
      zh: HTTP 端口
      zh-Hant: HTTP 連接埠
      ja: HTTP ポート
      ko: HTTP 포트
      ru: HTTP-порт
      ms: Port HTTP
      pt-br: Porta HTTP
    required: true
    type: number
    rule: paramPort
  - default: ./data/config
    edit: true
    envKey: CONFIG_PATH
    labelEn: Config folder path
    labelZh: 配置文件路径
    label:
      en: Config folder path
      zh: 配置文件路径
      zh-Hant: 設定檔資料夾路徑
      ja: 設定フォルダーのパス
      ko: 설정 폴더 경로
      ru: Путь к папке конфигурации
      ms: Laluan folder konfigurasi
      pt-br: Caminho da pasta de configuração
    required: true
    type: text
  - default: base64:dGVzdGluZy1saW51eHNlcnZlci1hcHBzLTEyMzQ1Njc=
    edit: true
    envKey: APP_KEY
    labelEn: Application key
    labelZh: 应用密钥
    label:
      en: Application key
      zh: 应用密钥
      zh-Hant: 應用程式金鑰
      ja: アプリケーションキー
