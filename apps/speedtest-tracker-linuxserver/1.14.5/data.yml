additionalProperties:
  formFields:
  - default: 80
    edit: true
    envKey: PANEL_APP_PORT_HTTP
    labelEn: HTTP Port
    labelZh: HTTP 端口
    label:
      en: HTTP Port
      zh: HTTP 端口
      zh-Hant: HTTP 連接埠
      ja: HTTP ポート
      ko: HTTP 포트
      ru: HTTP-порт
      ms: Port HTTP
      pt-br: Porta HTTP
    required: true
    type: number
    rule: paramPort
  - default: ./data/config
    edit: true
    envKey: CONFIG_PATH
    labelEn: Config folder path
    labelZh: 配置文件路径
    label:
      en: Config folder path
      zh: 配置文件路径
      zh-Hant: 設定檔資料夾路徑
      ja: 設定フォルダーのパス
      ko: 설정 폴더 경로
      ru: Путь к папке конфигурации
      ms: Laluan folder konfigurasi
      pt-br: Caminho da pasta de configuração
    required: true
    type: text
  - default: ''
    edit: true
    envKey: APP_KEY
    labelEn: Application key
    labelZh: 应用密钥
    label:
      en: Application key
      zh: 应用密钥
      zh-Hant: 應用程式金鑰
      ja: アプリケーションキー
      ko: 애플리케이션 키
      ru: Ключ приложения
      ms: Kunci aplikasi
      pt-br: Chave da aplicacao
    random: true
    required: true
    type: password
    rule: paramComplexity
  - default: ''
    edit: true
    envKey: APP_URL
    labelEn: Application URL
    labelZh: 应用访问 URL
    label:
      en: Application URL
      zh: 应用访问 URL
      zh-Hant: 應用程式存取 URL
      ja: アプリケーション URL
      ko: 애플리케이션 URL
      ru: URL приложения
      ms: URL aplikasi
      pt-br: URL da aplicacao
    required: false
    type: text
  - default: Asia/Shanghai
    edit: true
    envKey: TIME_ZONE
    labelEn: Time zone
    labelZh: 时区
    label:
      en: Time zone
      zh: 时区
      zh-Hant: 時區
      ja: タイムゾーン
      ko: 시간대
      ru: Часовой пояс
      ms: Zon waktu
      pt-br: Fuso horário
    required: true
    type: text
