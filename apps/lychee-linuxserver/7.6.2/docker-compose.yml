networks:
  1panel-network:
    external: true
services:
  lychee:
    image: "linuxserver/lychee:7.6.2"
    container_name: ${CONTAINER_NAME}
    restart: always
    networks:
      - 1panel-network
    ports:
      - "${PANEL_APP_PORT_HTTP}:80"
    volumes:
      - "${CONFIG_PATH}:/config"
      - "${PICTURES_PATH}:/pictures"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TIME_ZONE}
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/config/lychee.sqlite
    labels:
      createdBy: "Apps"
